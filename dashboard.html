<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ================== LIBRERÍAS ================== -->
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>

<style>
/* ================== VARIABLES ================== */
:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --txt:#0f172a;
 --muted:#64748b;
 --pri:#14b8a6;
 --pri-dark:#0d9488;
 --border:#cbd5e1;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Inter,Arial;
 background:var(--bg);
 color:var(--txt);
 padding:16px;
}




/* ================== HEADER ================== */
.topbar{margin-bottom:12px}

/* ================== KPIs ================== */
.kpis{
 display:grid;
 grid-template-columns:repeat(auto-fit,120px);
 gap:12px;
 margin-bottom:16px
}
.kpi{
 background:var(--card);
 border-radius:16px;
 padding:10px;
 text-align:center;
 box-shadow:0 4px 12px #0001
}
.kpi canvas{
 width:90px!important;
 height:90px!important
}

/* ================== FILTROS ================== */
.filters{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-bottom:12px
}
input,select{
 padding:10px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 font-size:14px;
 min-width:140px;
}

/* ================== BOTONES ================== */
button{
 position:relative;
 padding:10px 14px;
 border-radius:12px;
 border:0;
 background:var(--pri);
 color:#fff;
 font-weight:600;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:8px;
}
button:disabled{
 opacity:.7;
 cursor:not-allowed
}

/* ===== LOADER REAL ===== */
.btn-text{display:inline}
.btn-loader{
 display:none;
 width:18px;
 height:18px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}
button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ================== TABLA ================== */
.table-scroll{
 max-height:70vh;
 overflow-y:auto;
 border-radius:16px;
}

table{
 width:100%;
 border-collapse:collapse;
 background:var(--card);
 box-shadow:0 8px 24px #0001
}
th,td{
 padding:10px;
 border-bottom:1px solid var(--border);
 vertical-align:top;
}
th{
 color:var(--muted);
 text-align:left;
 position:sticky;
 top:0;
 background:var(--card);
 z-index:2;
}

/* ===== FECHAS NO MONTADAS ===== */
td.fecha{
 white-space:nowrap;
 font-size:13px;
}

/* ================== FOTOS ================== */
.foto-thumb{
 width:48px;
 height:48px;
 object-fit:cover;
 border-radius:8px;
 cursor:pointer;
 border:1px solid var(--border);
 transition:.2s;
}
.foto-thumb:hover{transform:scale(1.05)}

/* ================== MODALES (BASE) ================== */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.65);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}
.modal-content{
 background:var(--card);
 padding:20px;
 border-radius:18px;
 max-width:95%;
 max-height:90vh;
 overflow:auto;
}

/* ================== MODAL FOTO ================== */
.foto-modal-grande{
 width:90vw;
 max-width:1000px;
 display:flex;
 flex-direction:column;
 align-items:center;
}
.foto-grande{
 width:100%;
 max-height:75vh;
 object-fit:contain;
 border-radius:16px;
 box-shadow:0 12px 30px rgba(0,0,0,.4);
}

/* ================== MODAL MAPA ================== */
.map-frame{
 width:90vw;
 max-width:1000px;
 height:70vh;
 border:0;
 border-radius:16px;
}

/* ================== MOBILE ================== */
.mobile-list{display:none}

.row-card{
 background:var(--card);
 border-radius:18px;
 padding:14px;
 box-shadow:0 6px 18px #0001;
 margin-bottom:12px
}



/* ===== FIX DEFINITIVO ACCIONES ===== */
td .actions{
  display:flex !important;
  flex-direction:row !important;
  gap:8px;
  justify-content:center;
  align-items:center;
  white-space:nowrap;
}

td .actions button{
  display:inline-flex !important;
  width:38px;
  height:38px;
  padding:0;
  border-radius:10px;
}


@media(max-width:768px){
 .table-scroll{display:none}
 .mobile-list{display:block}
}

/* ===== ACCIONES MOBILE (LINEALES) ===== */
.row-actions{
  display:flex;
  flex-direction:row;          /* 👈 CLAVE */
  gap:10px;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.row-actions button{
  flex:1;                      /* todos mismo ancho */
  height:40px;
  padding:0;
  border-radius:10px;
  font-size:16px;
}

/* ================= DASHBOARD / KPIs ================= */
#kpis{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:12px;
  margin-bottom:16px;
}

/* Tarjeta KPI */
.kpi{
  background:#fff;
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* Canvas centrado */
.kpi canvas{
  width:90px !important;
  height:90px !important;
  margin:auto;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

  /* 👉 2 columnas reales en móvil */
  #kpis{
    grid-template-columns: repeat(2, 1fr);
    gap:14px;
  }

  /* KPI más ancho y cómodo */
  .kpi{
    padding:14px 10px;
  }

  .kpi b{
    font-size:18px;
    display:block;
    margin-top:4px;
  }

  .kpi br{
    display:none;
  }
}

/* ================= KPI TOCABLE ================= */
.kpi{
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease, background .15s;
  user-select:none;
}

.kpi:active{
  transform:scale(0.97);
}

.kpi:hover{
  box-shadow:0 6px 16px rgba(0,0,0,.15);
}

/* KPI activo (filtro aplicado) */
.kpi.active{
  outline:3px solid #2563eb;
  background:#eff6ff;
}

/* Texto */
.kpi b{
  font-size:18px;
  display:block;
}


 /* ================= TOGGLE DASHBOARD ================= */
.btn-kpi-toggle{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  margin-bottom:12px;
}

.btn-kpi-toggle:active{
  transform:scale(.96);
}

/* contenedor KPIs */
#kpis{
  transition: max-height .35s ease, opacity .25s ease, margin .25s;
  overflow:hidden;
}

/* oculto */
#kpis.hidden{
  max-height:0;
  opacity:0;
  margin:0;
  pointer-events:none;
}

/* visible */
#kpis:not(.hidden){
  max-height:600px; /* suficiente para KPIs */
  opacity:1;
}


 /* ================= CURSOR TABLA ================= */
tr.cursor-active{
  background:#e0f2fe !important;
}

tr.cursor-active td{
  border-top:1px solid #38bdf8;
  border-bottom:1px solid #38bdf8;
}

/* hover normal sigue funcionando */
tbody tr:hover{
  background:#f1f5f9;
}


/* ================= MOBILE ================= */
@media (max-width:768px){
  .kpi{
    padding:16px 12px;
  }
}

.foto-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  min-height:50px;
  align-items:center;
}

td{
  overflow: visible !important;
}

table{
  table-layout: fixed;
}





</style>
</head>

<body>
<!-- ================== HEADER ================== -->
<div class="topbar">
  <h2>🚚 Tracking de Pedidos</h2>
</div>

<!-- ================== KPIs ================== -->
<div class="kpis" id="kpis"></div>

<!-- ================== FILTROS ================== -->
<div class="filters">
  <input id="search" placeholder="Buscar pedido o cliente">
  <input type="date" id="fDesde">
  <input type="date" id="fHasta">

  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>ENTREGADO</option>
    <option>RECIBIDO</option>
    <option>CANCELADO</option>
  </select>

  <button id="btnNuevo">
    <span class="btn-text">➕ Nuevo</span>
    <span class="btn-loader"></span>
  </button>

  <button id="btnPDF">
    <span class="btn-text">📄 PDF</span>
    <span class="btn-loader"></span>
  </button>

  <button id="btnExcel">
    <span class="btn-text">📊 Excel</span>
    <span class="btn-loader"></span>
  </button>

<button id="btnToggleKPI" class="btn-text">
  📊 Ocultar dashboard
</button>

<button id="btnReload" class="btn-text">
  🔄 Recargar
</button>


 </div>



<!-- ================== TABLA DESKTOP ================== -->
<div class="table-scroll" tabindex="0">
  <table>
    <thead>
      <tr>
        <th>Fecha Ingreso</th>
        <th>Pedido</th>
        <th>Cliente</th>
        <th>Dirección</th>
        <th>Comuna</th>
        <th>Transporte</th>
        <th>Cajas</th>
        <th>Obs</th>
        <th>Estado</th>
        <th>Responsable</th>
        <th>Hora Entrega</th>
        <th>Foto</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <!-- filas dinámicas -->
    </tbody>
  </table>
</div>

<!-- ================== MOBILE ================== -->
<div class="mobile-list" id="mobileList">
  <!-- cards dinámicas -->
</div>

<!-- ================== MODAL FOTO ================== -->
<div class="modal" id="fotoModal">
  <div class="modal-content foto-modal-grande">
    <img id="fotoGrande" class="foto-grande" alt="Foto pedido">
    <br>
    <div style="display:flex;gap:10px">
      <button id="btnDescargarFoto">
        <span class="btn-text">⬇ Descargar</span>
        <span class="btn-loader"></span>
      </button>
      <button id="btnCerrarFoto">❌ Cerrar</button>
    </div>
  </div>
</div>

<!-- ================== MODAL MAPA ================== -->
<div class="modal" id="mapModal">
  <div class="modal-content">
    <iframe id="mapFrame" class="map-frame"></iframe>
    <br>
    <button id="btnCerrarMapa">❌ Cerrar</button>
  </div>
</div>

<!-- ================== MODAL FORMULARIO ================== -->
<div class="modal" id="modalForm">
  <div class="modal-content">

    <h3 id="mtitle">Nuevo Pedido</h3>

    <input id="mPedido" placeholder="Pedido">
    <input id="mCliente" placeholder="Cliente">
    <input id="mDireccion" placeholder="Dirección">
    <input id="mComuna" placeholder="Comuna">
    <input id="mTransporte" placeholder="Transporte">

    <input id="mCajas" type="number" min="1" placeholder="Cajas">

    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>ENTREGADO</option>
      <option>RECIBIDO</option>
      <option>CANCELADO</option>
    </select>

    <input id="mResponsable" placeholder="Responsable Entrega">
    <input id="mHoraEntrega" type="datetime-local">

    <input id="mObs" placeholder="Observaciones">

    <!-- FOTOS -->
    <input type="file" id="mFotos" accept="image/*" multiple capture="environment">

    <br><br>

    <div style="display:flex;gap:10px">
      <button id="btnGuardar">
        <span class="btn-text">💾 Guardar</span>
        <span class="btn-loader"></span>
      </button>
      <button id="btnCancelar">❌ Cancelar</button>
    </div>

  </div>
</div>

  <script src="segurity.js"></script>
  <script src="auth.js"></script>
  <script src="envios.js"></script>


  </body>
  </html>
