<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --text:#0f172a;
 --primary:#14b8a6;
 --primary-dark:#0d9488;
 --danger:#dc2626;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:var(--bg);
 padding:20px;
 color:var(--text);
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:15px;
}

button{
 border:0;
 border-radius:12px;
 padding:8px 14px;
 font-weight:600;
 cursor:pointer;
 background:var(--primary);
 color:#fff;
 display:flex;
 align-items:center;
 gap:6px;
}

button:hover{background:var(--primary-dark)}

button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
 display:none;
 width:16px;
 height:16px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:15px;
}

input,select,textarea{
 padding:8px 12px;
 border-radius:10px;
 border:1px solid #e2e8f0;
}

.stats{
 display:flex;
 gap:20px;
 margin-bottom:20px;
 font-weight:bold;
}

.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
 gap:22px;
}

.card{
 background:#fff;
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 22px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
}

.card-EN_RUTA{border-left-color:var(--danger)}

.pedido-numero{
 font-size:30px;
 font-weight:900;
 margin-bottom:6px;
}

.status{
 padding:6px 14px;
 border-radius:20px;
 font-weight:700;
 color:#fff;
 display:inline-block;
 margin-bottom:10px;
}

.status-EN_RUTA{background:var(--danger)}
.status-PENDIENTE{background:#2563eb}
.status-RECIBIDO{background:#7c3aed}
.status-ENTREGADO{background:#16a34a}
.status-CANCELADO{background:#6b7280}

.cajas-box{
 margin-top:12px;
 background:#111827;
 color:#fff;
 text-align:center;
 padding:14px;
 border-radius:14px;
}

.cajas-box span{
 display:block;
 font-size:36px;
 font-weight:900;
}

.responsable{
 margin-top:8px;
 font-weight:bold;
}

.observaciones{
 margin-top:10px;
 background:#f1f5f9;
 padding:10px;
 border-radius:10px;
 font-size:14px;
}

.map-box{
 margin-top:12px;
 border-radius:12px;
 overflow:hidden;
}

.map-box iframe{
 width:100%;
 height:200px;
 border:0;
}

.map-buttons{
 margin-top:8px;
 display:flex;
 gap:6px;
}

.map-buttons a{
 flex:1;
 text-align:center;
 background:#0f172a;
 color:#fff;
 padding:8px;
 border-radius:10px;
 text-decoration:none;
 font-size:13px;
}

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.7);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.modal img{
 max-width:90vw;
 max-height:85vh;
 border-radius:12px;
}

.edit-modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.edit-box{
 background:#fff;
 padding:20px;
 border-radius:16px;
 width:420px;
 max-width:95%;
}
</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <div style="display:flex;gap:10px">
    <button onclick="toggleFullscreen()">Modo TV</button>
    <button id="btnReload">
      <span class="btn-text">Recargar</span>
      <span class="btn-loader"></span>
    </button>
  </div>
</div>

<div class="filters">
  <input type="text" id="fBuscar" placeholder="Buscar pedido, cliente, comuna o responsable">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
  <input type="date" id="fDesde">
  <input type="date" id="fHasta">
</div>

<div class="stats">
  <div>Pedidos: <span id="totalPedidos">0</span></div>
  <div>Cajas: <span id="totalCajas">0</span></div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<div class="edit-modal" id="editModal">
  <div class="edit-box">
    <h3>Editar Pedido</h3>
    <input id="mPedido" placeholder="Pedido">
    <input id="mCliente" placeholder="Cliente">
    <input id="mDireccion" placeholder="Dirección">
    <input id="mComuna" placeholder="Comuna">
    <input id="mResponsable" placeholder="Responsable">
    <input type="number" id="mCajas" placeholder="Cajas">
    <textarea id="mObservaciones" rows="3" placeholder="Observaciones"></textarea>
    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>RECIBIDO</option>
      <option>ENTREGADO</option>
      <option>CANCELADO</option>
    </select>
    <button id="btnGuardar">
      <span class="btn-text">Guardar</span>
      <span class="btn-loader"></span>
    </button>
    <button onclick="closeEdit()">Cerrar</button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[], FILT=[], visibleCount=0, EDIT_ROW=null, PREV_IDS=[];
const CHUNK=20;

function parseFecha(f){ return f ? new Date(f) : null; }

function setLoading(btn,state){
 btn.disabled=state;
 btn.classList.toggle("loading",state);
}

function cleanStatus(s){ return (s||"").replace(/\s+/g,"_"); }

function mapEmbed(r){
 if(r.lat && r.lng){
   return `https://maps.google.com/maps?q=${r.lat},${r.lng}&z=15&output=embed`;
 }
 return `https://maps.google.com/maps?q=${encodeURIComponent(r.direccion+" "+r.comuna)}&z=15&output=embed`;
}

function googleMaps(r){
 if(r.lat && r.lng){
   return `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
 }
 return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.direccion+" "+r.comuna)}`;
}

function waze(r){
 if(r.lat && r.lng){
   return `https://waze.com/ul?ll=${r.lat},${r.lng}&navigate=yes`;
 }
 return `https://waze.com/ul?q=${encodeURIComponent(r.direccion+" "+r.comuna)}&navigate=yes`;
}

async function load(){
 setLoading(btnReload,true);
 const r=await fetch(API);
 RAW=await r.json();

 RAW.sort((a,b)=>parseFecha(b.fecha)-parseFecha(a.fecha));

 const ids=RAW.map(x=>x._row);
 if(PREV_IDS.length && ids.some(id=>!PREV_IDS.includes(id))){
   new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
 }
 PREV_IDS=ids;

 applyFilter();
 setLoading(btnReload,false);
}

function applyFilter(){
 const texto=fBuscar.value.toLowerCase();
 const status=fStatus.value;
 const desde=fDesde.value?new Date(fDesde.value):null;
 const hasta=fHasta.value?new Date(fHasta.value):null;

 FILT=RAW.filter(r=>{
   const combinado=(r.pedido+" "+r.cliente+" "+r.comuna+" "+r.responsable).toLowerCase();
   if(texto && !combinado.includes(texto)) return false;
   if(status && r.status!==status) return false;
   const fecha=parseFecha(r.fecha);
   if(desde && fecha && fecha<desde) return false;
   if(hasta && fecha && fecha>hasta) return false;
   return true;
 });

 totalPedidos.textContent=FILT.length;
 totalCajas.textContent=FILT.reduce((s,r)=>s+Number(r.etiquetas||0),0);

 visibleCount=0;
 cardsGrid.innerHTML="";
 renderMore();
}

function renderMore(){
 const fragment=document.createDocumentFragment();
 const slice=FILT.slice(visibleCount, visibleCount+CHUNK);

 slice.forEach(r=>{
   const st=cleanStatus(r.status);

   const card=document.createElement("div");
   card.className="card card-"+st;

   card.innerHTML=`
     <div class="pedido-numero">#${r.pedido||""}</div>
     <div class="status status-${st}">${r.status||""}</div>
     <div>👤 ${r.cliente||""}</div>
     <div>📍 ${r.direccion||""} (${r.comuna||""})</div>
     <div class="responsable">👨‍💼 ${r.responsable||""}</div>

     <div class="cajas-box">
       CAJAS
       <span>${r.etiquetas||0}</span>
     </div>

     ${r.observaciones ? `<div class="observaciones"><strong>Obs:</strong> ${r.observaciones}</div>` : ""}

     <div class="map-box">
       <iframe src="${mapEmbed(r)}" loading="lazy"></iframe>
     </div>

     <div class="map-buttons">
       <a href="${googleMaps(r)}" target="_blank">Google Maps</a>
       <a href="${waze(r)}" target="_blank">Waze</a>
     </div>

     <div style="margin-top:12px">
       <button onclick="openEdit(${r._row})">Editar</button>
     </div>
   `;
   fragment.appendChild(card);
 });

 cardsGrid.appendChild(fragment);
 visibleCount+=CHUNK;
}

function openEdit(row){
 const r=RAW.find(x=>x._row==row);
 EDIT_ROW=row;
 mPedido.value=r.pedido||"";
 mCliente.value=r.cliente||"";
 mDireccion.value=r.direccion||"";
 mComuna.value=r.comuna||"";
 mResponsable.value=r.responsable||"";
 mCajas.value=r.etiquetas||1;
 mObservaciones.value=r.observaciones||"";
 mStatus.value=r.status||"";
 editModal.style.display="flex";
}

function closeEdit(){ editModal.style.display="none"; }

async function guardar(){
 setLoading(btnGuardar,true);
 await fetch(API,{
   method:"POST",
   body:JSON.stringify({
     action:"update",
     row:EDIT_ROW,
     PEDIDO:mPedido.value,
     CLIENTE:mCliente.value,
     DIRECCION:mDireccion.value,
     COMUNA:mComuna.value,
     RESPONSABLE:mResponsable.value,
     ETIQUETAS:mCajas.value,
     OBSERVACIONES:mObservaciones.value,
     STATUS:mStatus.value
   })
 });
 closeEdit();
 load();
 setLoading(btnGuardar,false);
}

function toggleFullscreen(){
 if(!document.fullscreenElement){
   document.documentElement.requestFullscreen();
 }else{
   document.exitFullscreen();
 }
}

window.addEventListener("scroll",()=>{
 if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
   if(visibleCount < FILT.length){
     renderMore();
   }
 }
});

let debounce;
fBuscar.oninput=()=>{
 clearTimeout(debounce);
 debounce=setTimeout(applyFilter,300);
};

fStatus.onchange=applyFilter;
fDesde.onchange=applyFilter;
fHasta.onchange=applyFilter;

btnReload.onclick=load;
btnGuardar.onclick=guardar;

setInterval(load,15000);
load();
</script>

</body>
</html>
