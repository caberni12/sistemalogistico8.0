<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --bg-tv:#0f172a;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
 --turq:#14b8a6;
 --turq-dark:#0d9488;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:var(--bg);
 padding:20px;
 color:var(--text);
 transition:.3s;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:15px;
}

button{
 border:0;
 border-radius:12px;
 padding:8px 14px;
 font-size:13px;
 font-weight:600;
 cursor:pointer;
 background:var(--turq);
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:6px;
 position:relative;
}

button:hover{background:var(--turq-dark)}

button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
 display:none;
 width:16px;
 height:16px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:15px;
}

input,select{
 padding:8px 12px;
 border-radius:10px;
 border:1px solid var(--border);
}

.stats{
 display:flex;
 gap:20px;
 margin-bottom:20px;
 flex-wrap:wrap;
 font-weight:bold;
 font-size:16px;
}

.stat-box{
 background:#e0f2f1;
 padding:10px 16px;
 border-radius:12px;
}

.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
 gap:22px;
}

.card{
 background:var(--card);
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
}

.card.PENDIENTE{border-left-color:#3b82f6}
.card.EN\ RUTA{border-left-color:#f97316}
.card.RECIBIDO{border-left-color:#ef4444}
.card.ENTREGADO{border-left-color:#22c55e}
.card.CANCELADO{border-left-color:#9ca3af}

.status{
 background:#000;
 padding:6px 12px;
 border-radius:8px;
 font-size:12px;
 font-weight:bold;
 display:inline-block;
 margin-top:6px;
}

.status.PENDIENTE{color:#3b82f6}
.status.EN\ RUTA{color:#facc15}
.status.RECIBIDO{color:#ef4444}
.status.ENTREGADO{color:#22c55e}
.status.CANCELADO{color:#9ca3af}

.cajas{
 background:#f1f5f9;
 padding:8px 12px;
 border-radius:12px;
 font-weight:bold;
 margin-top:10px;
 display:inline-block;
}

.photo-wrap{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-top:10px;
}

.photo-wrap img{
 width:70px;
 height:70px;
 object-fit:cover;
 border-radius:10px;
 cursor:pointer;
}

.pdf-wrap{
 margin-top:10px;
 display:flex;
 gap:6px;
 flex-wrap:wrap;
}

.pdf-wrap a{
 background:#0f172a;
 color:#fff;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
 text-decoration:none;
}

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.foto-modal img{
 max-width:90vw;
 max-height:80vh;
 border-radius:12px;
}
</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <button id="btnReload">
    <span class="btn-text">🔄 Recargar</span>
    <span class="btn-loader"></span>
  </button>
</div>

<div class="filters">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
  <input type="date" id="fDesde">
  <input type="date" id="fHasta">
</div>

<div class="stats">
  <div class="stat-box">📦 Total Pedidos: <span id="totalPedidos">0</span></div>
  <div class="stat-box">📦 Total Cajas: <span id="totalCajas">0</span></div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="modal foto-modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<audio id="notifSound">
 <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>
const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[];
let FILT=[];
let PREVIOUS_IDS=[];

setInterval(load,15000);

function setLoading(btn,state){
 btn.disabled=state;
 btn.classList.toggle("loading",state);
}

async function load(){
 setLoading(btnReload,true);

 const r=await fetch(API);
 RAW=await r.json();

 applyFilter();
 setLoading(btnReload,false);
}

function parseFecha(str){
 if(!str) return null;
 const [f]=str.split(" ");
 const [d,m,y]=f.split("-").map(Number);
 return new Date(y,m-1,d);
}

function applyFilter(){
 const status=fStatus.value;
 const desde=fDesde.value ? new Date(fDesde.value) : null;
 const hasta=fHasta.value ? new Date(fHasta.value) : null;

 FILT=RAW.filter(r=>{
   if(status && r.status!==status) return false;
   const fecha=parseFecha(r.fechaIngreso);
   if(desde && fecha<desde) return false;
   if(hasta && fecha>hasta) return false;
   return true;
 });

 updateStats();
 render();
}

function updateStats(){
 totalPedidos.textContent=FILT.length;
 totalCajas.textContent=FILT.reduce((s,r)=>s+Number(r.etiquetas||0),0);
}

fStatus.onchange=applyFilter;
fDesde.onchange=applyFilter;
fHasta.onchange=applyFilter;
btnReload.onclick=load;

function render(){
 cardsGrid.innerHTML="";
 FILT.forEach(r=>{
  const fotos=(r.foto||"").split("|").filter(u=>u.startsWith("http"));
  const pdfs=(r.pdf||"").split("|").filter(u=>u.startsWith("http"));

  cardsGrid.insertAdjacentHTML("beforeend",`
    <div class="card ${r.status}">
      <h3>${r.pedido||""}</h3>
      <div class="status ${r.status}">${r.status||""}</div>
      <div>👤 ${r.cliente||""}</div>
      <div>📍 ${r.direccion||""} (${r.comuna||""})</div>
      <div class="cajas">📦 ${r.etiquetas||0} CAJAS</div>

      <div class="photo-wrap">
        ${fotos.map(f=>`<img src="${f.replace(/=s\\d+$/,'=s300')}" onclick="showFoto('${f.replace(/=s\\d+$/,'=s1600')}')">`).join("")}
      </div>

      <div class="pdf-wrap">
        ${pdfs.map(p=>`<a href="${p}" target="_blank">📄 Ver</a>`).join("")}
      </div>
    </div>
  `);
 });
}

function showFoto(url){
 fotoGrande.src=url;
 fotoModal.style.display="flex";
}

load();
</script>

</body>
</html>
