<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>

<style>

/* ================= VARIABLES ================= */
:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --txt:#0f172a;
 --muted:#64748b;
 --pri:#14b8a6;
 --border:#cbd5e1;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Inter,Arial;
 background:var(--bg);
 color:var(--txt);
 padding:16px;
}

/* ================= HEADER ================= */
.topbar{
 margin-bottom:16px;
}

/* ================= KPIs ================= */
.kpis{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:12px;
 margin-bottom:16px;
}

.kpi{
 background:var(--card);
 border-radius:12px;
 padding:12px;
 text-align:center;
 box-shadow:0 4px 10px rgba(0,0,0,.08);
 cursor:pointer;
 transition:.2s;
}

.kpi:hover{
 transform:translateY(-2px);
}

/* ================= FILTROS ================= */
.filters{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-bottom:16px;
}

input,select{
 padding:10px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 font-size:14px;
}

/* ================= BOTONES ================= */
button{
 padding:10px 14px;
 border-radius:12px;
 border:0;
 background:var(--pri);
 color:#fff;
 font-weight:600;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:6px;
 transition:.2s;
}

button:hover{
 opacity:.9;
}

button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
 display:none;
 width:16px;
 height:16px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* ================= TABLA ================= */
.table-scroll{
 max-height:70vh;
 overflow-y:auto;
 border-radius:12px;
}

table{
 width:100%;
 border-collapse:collapse;
 background:var(--card);
 box-shadow:0 8px 20px rgba(0,0,0,.06);
}

th,td{
 padding:10px;
 border-bottom:1px solid var(--border);
 font-size:14px;
}

th{
 background:#fff;
 position:sticky;
 top:0;
 z-index:2;
 text-align:left;
}

/* ================= PEDIDOS EN CURSO ================= */
#kanbanView{
 margin-top:10px;
}

.kanban-board{
 display:flex;
 gap:16px;
 overflow-x:auto;
 padding-bottom:10px;
}

.kanban-column{
 min-width:260px;
 background:#eef2f7;
 border-radius:14px;
 padding:12px;
}

.kanban-column h3{
 text-align:center;
 margin-bottom:12px;
 font-size:14px;
}

.kanban-card{
 background:#fff;
 border-radius:12px;
 padding:10px;
 margin-bottom:10px;
 box-shadow:0 4px 10px rgba(0,0,0,.08);
 font-size:13px;
}

.kanban-actions{
 display:flex;
 gap:6px;
 margin-top:8px;
}

.kanban-actions button{
 flex:1;
 height:32px;
 font-size:13px;
}

/* ================= MODALES ================= */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.modal-content{
 background:#fff;
 padding:20px;
 border-radius:16px;
 max-width:95%;
 max-height:90vh;
 overflow:auto;
}

</style>
</head>
<body>

<!-- ================= HEADER ================= -->
<div class="topbar">
  <h2>🚚 Tracking de Pedidos</h2>
</div>

<!-- ================= KPIs ================= -->
<div class="kpis" id="kpis"></div>

<!-- ================= FILTROS ================= -->
<div class="filters">

  <input id="search" placeholder="Buscar pedido o cliente">

  <input type="date" id="fDesde">
  <input type="date" id="fHasta">

  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>ENTREGADO</option>
    <option>RECIBIDO</option>
    <option>CANCELADO</option>
  </select>

  <button id="btnNuevo">
    <span class="btn-text">➕ Nuevo</span>
    <span class="btn-loader"></span>
  </button>

  <button id="btnPDF">
    <span class="btn-text">📄 PDF</span>
    <span class="btn-loader"></span>
  </button>

  <button id="btnExcel">
    <span class="btn-text">📊 Excel</span>
    <span class="btn-loader"></span>
  </button>

  <button id="btnToggleKPI">
    📊 Ocultar dashboard
  </button>

  <button id="btnReload">
    🔄 Recargar
  </button>

  <button id="btnViewMode">
    📋 PEDIDOS EN CURSO
  </button>

</div>


<!-- ================= TABLA DESKTOP ================= -->
<div class="table-scroll" id="tableView">
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Pedido</th>
        <th>Cliente</th>
        <th>Dirección</th>
        <th>Comuna</th>
        <th>Transporte</th>
        <th>Cajas</th>
        <th>Obs</th>
        <th>Estado</th>
        <th>Responsable</th>
        <th>Hora Entrega</th>
        <th>Foto</th>
        <th>PDF</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>


<!-- ================= PEDIDOS EN CURSO ================= -->
<div id="kanbanView" style="display:none">

  <div class="kanban-board">

    <div class="kanban-column" data-status="PENDIENTE">
      <h3>🟡 Pendiente</h3>
      <div class="kanban-cards"></div>
    </div>

    <div class="kanban-column" data-status="EN RUTA">
      <h3>🟠 En Ruta</h3>
      <div class="kanban-cards"></div>
    </div>

    <div class="kanban-column" data-status="RECIBIDO">
      <h3>🔴 Recibido</h3>
      <div class="kanban-cards"></div>
    </div>

    <div class="kanban-column" data-status="ENTREGADO">
      <h3>🟢 Entregado</h3>
      <div class="kanban-cards"></div>
    </div>

  </div>

</div>


<!-- ================= MOBILE ================= -->
<div class="mobile-list" id="mobileList"></div>

<!-- ================= MODAL FOTO ================= -->
<div class="modal" id="fotoModal">
  <div class="modal-content" style="max-width:1000px;text-align:center">

    <img id="fotoGrande"
         style="width:100%;max-height:75vh;object-fit:contain;border-radius:14px">

    <br><br>

    <div style="display:flex;gap:10px;justify-content:center">

      <button id="btnDescargarFoto">
        <span class="btn-text">⬇ Descargar</span>
        <span class="btn-loader"></span>
      </button>

      <button id="btnCerrarFoto">
        ❌ Cerrar
      </button>

    </div>

  </div>
</div>


<!-- ================= MODAL MAPA ================= -->
<div class="modal" id="mapModal">
  <div class="modal-content" style="max-width:1000px">

    <iframe id="mapFrame"
            style="width:100%;height:70vh;border:0;border-radius:14px">
    </iframe>

    <br><br>

    <button id="btnCerrarMapa">
      ❌ Cerrar
    </button>

  </div>
</div>


<!-- ================= MODAL FORMULARIO ================= -->
<div class="modal" id="modalForm">
  <div class="modal-content" style="width:420px;max-width:95%">

    <h3 id="mtitle">Nuevo Pedido</h3>

    <input id="mPedido" placeholder="Pedido">
    <br><br>

    <input id="mCliente" placeholder="Cliente">
    <br><br>

    <input id="mDireccion" placeholder="Dirección">
    <br><br>

    <input id="mComuna" placeholder="Comuna">
    <br><br>

    <input id="mTransporte" placeholder="Transporte">
    <br><br>

    <input id="mCajas" type="number" min="1" placeholder="Cajas">
    <br><br>

    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>RECIBIDO</option>
      <option>ENTREGADO</option>
      <option>CANCELADO</option>
    </select>
    <br><br>

    <input id="mResponsable" placeholder="Responsable Entrega">
    <br><br>

    <input id="mHoraEntrega" type="datetime-local">
    <br><br>

    <input id="mObs" placeholder="Observaciones">
    <br><br>

    <!-- FOTOS -->
    <input type="file"
           id="mFotos"
           accept="image/*"
           multiple
           capture="environment">
    <br><br>

    <!-- PDF -->
    <input type="file"
           id="mPdf"
           accept="application/pdf"
           multiple>
    <br><br>

    <div style="display:flex;gap:10px">

      <button id="btnGuardar">
        <span class="btn-text">💾 Guardar</span>
        <span class="btn-loader"></span>
      </button>

      <button id="btnCancelar">
        ❌ Cancelar
      </button>

    </div>

  </div>
</div>


<!-- ================= SCRIPT PRINCIPAL ================= -->
<script src="envio.js"></script>

</body>
</html>
