<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --bg-tv:#0f172a;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
 --primary:#14b8a6;
 --primary-dark:#0d9488;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:var(--bg);
 padding:20px;
 color:var(--text);
 transition:.3s;
}

body.tv-mode{
 background:var(--bg-tv);
 color:#fff;
 padding:30px;
}

/* HEADER */
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:15px;
}

button{
 border:0;
 border-radius:12px;
 padding:8px 14px;
 font-size:13px;
 font-weight:600;
 cursor:pointer;
 background:var(--primary);
 color:#fff;
}

button:hover{background:var(--primary-dark)}

.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:15px;
}

input,select{
 padding:8px 12px;
 border-radius:10px;
 border:1px solid var(--border);
}

.stats{
 display:flex;
 gap:20px;
 margin-bottom:20px;
 flex-wrap:wrap;
 font-weight:bold;
}

.stat-box{
 background:#e0f2f1;
 padding:10px 16px;
 border-radius:12px;
}

/* GRID */
.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
 gap:22px;
}

.card{
 background:var(--card);
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
}

/* BORDES POR ESTADO */
.card-PENDIENTE{border-left-color:#2563eb}
.card-EN_RUTA{border-left-color:#dc2626}
.card-RECIBIDO{border-left-color:#7c3aed}
.card-ENTREGADO{border-left-color:#16a34a}
.card-CANCELADO{border-left-color:#6b7280}

/* BADGE ESTADO */
.status{
 padding:6px 14px;
 border-radius:20px;
 font-size:13px;
 font-weight:700;
 display:inline-block;
 margin-top:6px;
 color:#fff;
}

.status-PENDIENTE{background:#2563eb}
.status-EN_RUTA{background:#dc2626} /* ROJO FUERTE */
.status-RECIBIDO{background:#7c3aed}
.status-ENTREGADO{background:#16a34a}
.status-CANCELADO{background:#6b7280}

.cajas{
 background:#f1f5f9;
 padding:8px 12px;
 border-radius:12px;
 font-weight:bold;
 margin-top:10px;
 display:inline-block;
}

/* FOTOS */
.photo-wrap{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-top:10px;
}

.photo-wrap img{
 width:80px;
 height:80px;
 object-fit:cover;
 border-radius:10px;
 cursor:pointer;
 border:2px solid #e2e8f0;
}

/* PDF */
.pdf-wrap{
 margin-top:10px;
 display:flex;
 gap:6px;
 flex-wrap:wrap;
}

.pdf-wrap a{
 background:#0f172a;
 color:#fff;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
 text-decoration:none;
}

/* MODAL FOTO */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.7);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.modal img{
 max-width:90vw;
 max-height:85vh;
 border-radius:12px;
}

/* MODAL EDIT */
.edit-modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.edit-box{
 background:#fff;
 padding:20px;
 border-radius:16px;
 width:400px;
 max-width:95%;
}
.edit-box input,
.edit-box select{
 width:100%;
 margin-bottom:10px;
 padding:8px;
}
</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <div>
    <button onclick="toggleTV()">Modo TV</button>
    <button onclick="load()">Recargar</button>
  </div>
</div>

<div class="filters">
  <input type="text" id="fBuscar" placeholder="Buscar pedido, cliente o comuna">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
  <input type="date" id="fDesde">
  <input type="date" id="fHasta">
</div>

<div class="stats">
  <div class="stat-box">Pedidos: <span id="totalPedidos">0</span></div>
  <div class="stat-box">Cajas: <span id="totalCajas">0</span></div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<!-- MODAL FOTO -->
<div class="modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<!-- MODAL EDITAR -->
<div class="edit-modal" id="editModal">
  <div class="edit-box">
    <h3>Editar Pedido</h3>
    <input id="mPedido">
    <input id="mCliente">
    <input id="mDireccion">
    <input id="mComuna">
    <input type="number" id="mCajas" min="1">
    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>RECIBIDO</option>
      <option>ENTREGADO</option>
      <option>CANCELADO</option>
    </select>
    <button onclick="guardar()">Guardar</button>
    <button onclick="closeEdit()">Cerrar</button>
  </div>
</div>

<audio id="notifSound">
 <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>
const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[];
let EDIT_ROW=null;
let PREV_IDS=[];

function cleanStatus(s){
 return (s||"").replace(/\s+/g,"_");
}

async function load(){
 const r=await fetch(API);
 RAW=await r.json();

 const ids=RAW.map(x=>x._row);
 if(PREV_IDS.length && ids.some(id=>!PREV_IDS.includes(id))){
   document.getElementById("notifSound").play();
 }
 PREV_IDS=ids;

 applyFilter();
}

function parseFecha(str){
 if(!str) return null;
 const [f]=str.split(" ");
 const [d,m,y]=f.split("-").map(Number);
 return new Date(y,m-1,d);
}

function applyFilter(){
 const texto=fBuscar.value.toLowerCase();
 const status=fStatus.value;
 const desde=fDesde.value ? new Date(fDesde.value) : null;
 const hasta=fHasta.value ? new Date(fHasta.value) : null;

 const data=RAW.filter(r=>{
   const combinado=(r.pedido+" "+r.cliente+" "+r.direccion+" "+r.comuna).toLowerCase();
   if(texto && !combinado.includes(texto)) return false;
   if(status && r.status!==status) return false;

   const fecha=parseFecha(r.fechaIngreso);
   if(desde && fecha<desde) return false;
   if(hasta && fecha>hasta) return false;

   return true;
 });

 totalPedidos.textContent=data.length;
 totalCajas.textContent=data.reduce((s,r)=>s+Number(r.etiquetas||0),0);

 render(data);
}

function render(data){
 cardsGrid.innerHTML="";
 data.forEach(r=>{
   const st=cleanStatus(r.status);
   const fotos=(r.foto||"").split("|").filter(u=>u.startsWith("http"));
   const pdfs=(r.pdf||"").split("|").filter(u=>u.startsWith("http"));

   const card=document.createElement("div");
   card.className="card card-"+st;

   card.innerHTML=`
     <h3>${r.pedido||""}</h3>
     <div class="status status-${st}">${r.status||""}</div>
     <div style="margin-top:8px">
       👤 ${r.cliente||""}<br>
       📍 ${r.direccion||""} (${r.comuna||""})
     </div>
     <div class="cajas">📦 ${r.etiquetas||0} CAJAS</div>

     <div class="photo-wrap">
       ${fotos.map(f=>`<img src="${f}" onclick="showFoto('${f}')">`).join("")}
     </div>

     <div class="pdf-wrap">
       ${pdfs.map(p=>`
         <a href="${p}" target="_blank">Ver</a>
         <a href="${p}" download>Descargar</a>
       `).join("")}
     </div>

     <div style="margin-top:12px">
       <button onclick="openEdit(${r._row})">Editar</button>
     </div>
   `;
   cardsGrid.appendChild(card);
 });
}

function showFoto(url){
 fotoGrande.src=url;
 fotoModal.style.display="flex";
}

function openEdit(row){
 const r=RAW.find(x=>x._row==row);
 EDIT_ROW=row;
 mPedido.value=r.pedido||"";
 mCliente.value=r.cliente||"";
 mDireccion.value=r.direccion||"";
 mComuna.value=r.comuna||"";
 mCajas.value=r.etiquetas||1;
 mStatus.value=r.status||"";
 editModal.style.display="flex";
}

function closeEdit(){
 editModal.style.display="none";
}

async function guardar(){
 await fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"update",
    row:EDIT_ROW,
    PEDIDO:mPedido.value,
    CLIENTE:mCliente.value,
    DIRECCION:mDireccion.value,
    COMUNA:mComuna.value,
    ETIQUETAS:mCajas.value,
    STATUS:mStatus.value
  })
 });
 closeEdit();
 load();
}

function toggleTV(){
 document.body.classList.toggle("tv-mode");
}

fBuscar.oninput=applyFilter;
fStatus.onchange=applyFilter;
fDesde.onchange=applyFilter;
fHasta.onchange=applyFilter;

setInterval(load,15000);
load();
</script>

</body>
</html>
