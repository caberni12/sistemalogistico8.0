<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Inter,Arial;
 background:var(--bg);
 padding:20px;
 color:var(--text);
}

/* HEADER */
.header{
 margin-bottom:25px;
}

.header h2{
 margin:0;
 font-size:22px;
}

/* FILTROS */
.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:25px;
}

input,select{
 padding:10px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 font-size:14px;
}

/* GRID TARJETAS */
.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
 gap:20px;
}

/* TARJETA */
.card{
 background:var(--card);
 border-radius:18px;
 padding:18px;
 box-shadow:0 10px 24px rgba(0,0,0,.08);
 transition:.25s;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
}

.card:hover{
 transform:translateY(-5px);
}

/* CABECERA TARJETA */
.card-header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:12px;
}

.card-header strong{
 font-size:16px;
}

/* STATUS */
.status{
 padding:6px 12px;
 border-radius:10px;
 font-size:12px;
 font-weight:700;
 background:#000;
}

.status.PENDIENTE{color:#3b82f6}
.status.EN\ RUTA{color:#f97316}
.status.RECIBIDO{color:#ef4444}
.status.ENTREGADO{color:#22c55e}
.status.CANCELADO{color:#9ca3af}

/* CUERPO */
.card-body{
 font-size:14px;
 line-height:1.5;
 margin-bottom:14px;
}

/* ACCIONES */
.card-actions{
 display:flex;
 gap:10px;
}

.card-actions button{
 flex:1;
 border:0;
 border-radius:12px;
 padding:10px;
 font-size:13px;
 font-weight:600;
 cursor:pointer;
 background:#0f172a;
 color:#fff;
}

.card-actions button:hover{
 opacity:.9;
}

/* RESPONSIVE */
@media(max-width:768px){
 .cards-grid{
  grid-template-columns:1fr;
 }
}

</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
</div>

<div class="filters">
  <input id="search" placeholder="Buscar pedido o cliente">
  <input type="date" id="fDesde">
  <input type="date" id="fHasta">

  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW = [];
let FILT = [];

/* LOAD */
async function load(){
  const r = await fetch(API);
  RAW = await r.json();
  applyFilters();
}

/* FILTROS */
function applyFilters(){

  const q = search.value.toLowerCase().trim();
  const s = fStatus.value;

  const d1 = fDesde.value ? new Date(fDesde.value+"T00:00:00") : null;
  const d2 = fHasta.value ? new Date(fHasta.value+"T23:59:59") : null;

  FILT = RAW.filter(r=>{

    const pedido = String(r.pedido||"").toLowerCase();
    const cliente = String(r.cliente||"").toLowerCase();
    const status = String(r.status||"");
    const fecha = parseFecha(r.fechaIngreso);

    const textOK = !q || pedido.includes(q) || cliente.includes(q);
    const statusOK = !s || status === s;

    let fechaOK = true;
    if(d1 && fecha < d1) fechaOK = false;
    if(d2 && fecha > d2) fechaOK = false;

    return textOK && statusOK && fechaOK;
  });

  render();
}

/* PARSE FECHA */
function parseFecha(str){
  if(!str) return new Date();
  const [f,h] = str.split(" ");
  const [d,m,y] = f.split("-").map(Number);
  const [hh=0,mm=0] = (h||"0:0").split(":").map(Number);
  return new Date(y,m-1,d,hh,mm);
}

/* RENDER TARJETAS */
function render(){

  cardsGrid.innerHTML = "";

  FILT.forEach(r=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-header">
        <strong>${r.pedido || ""}</strong>
        <span class="status ${r.status}">
          ${r.status || ""}
        </span>
      </div>

      <div class="card-body">
        👤 ${r.cliente || ""}<br>
        📍 ${r.direccion || ""} (${r.comuna || ""})<br>
        🚚 ${r.transporte || ""}<br>
        📦 Cajas: ${r.etiquetas || 0}<br>
        ⏱ ${r.horaEntrega || ""}
      </div>

      <div class="card-actions">
        <button onclick="openMap('${r.direccion}','${r.comuna}')">📍</button>
        <button onclick="deletePedido(${r._row})">🗑</button>
      </div>
    `;

    cardsGrid.appendChild(card);
  });
}

/* MAPA */
function openMap(d,c){
  window.open(
    `https://www.google.com/maps?q=${encodeURIComponent(d+', '+c+', Chile')}`,
    "_blank"
  );
}

/* DELETE */
async function deletePedido(row){
  if(!confirm("¿Eliminar pedido?")) return;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      row
    })
  });

  load();
}

/* EVENTOS */
search.oninput = applyFilters;
fStatus.onchange = applyFilters;
fDesde.onchange = applyFilters;
fHasta.onchange = applyFilters;

/* INIT */
load();

</script>

</body>
</html>
