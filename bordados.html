<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
 --primary:#14b8a6;
 --primary-dark:#0d9488;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:var(--bg);
 padding:20px;
 color:var(--text);
}

/* HEADER */
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:15px;
}

button{
 border:0;
 border-radius:12px;
 padding:8px 14px;
 font-size:13px;
 font-weight:600;
 cursor:pointer;
 background:var(--primary);
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:6px;
 position:relative;
}

button:hover{background:var(--primary-dark)}

button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
 display:none;
 width:16px;
 height:16px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* FILTROS */
.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:15px;
}

input,select{
 padding:8px 12px;
 border-radius:10px;
 border:1px solid var(--border);
}

/* CONTADORES */
.stats{
 display:flex;
 gap:20px;
 margin-bottom:20px;
 flex-wrap:wrap;
 font-weight:bold;
}

.stat-box{
 background:#e0f2f1;
 padding:10px 16px;
 border-radius:12px;
}

/* GRID */
.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
 gap:22px;
}

.card{
 background:var(--card);
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
}

.card-PENDIENTE{border-left-color:#2563eb}
.card-EN_RUTA{border-left-color:#dc2626}
.card-RECIBIDO{border-left-color:#7c3aed}
.card-ENTREGADO{border-left-color:#16a34a}
.card-CANCELADO{border-left-color:#6b7280}

.status{
 padding:6px 14px;
 border-radius:20px;
 font-size:13px;
 font-weight:700;
 display:inline-block;
 margin-top:6px;
 color:#fff;
}

.status-PENDIENTE{background:#2563eb}
.status-EN_RUTA{background:#dc2626}
.status-RECIBIDO{background:#7c3aed}
.status-ENTREGADO{background:#16a34a}
.status-CANCELADO{background:#6b7280}

.cajas{
 background:#f1f5f9;
 padding:8px 12px;
 border-radius:12px;
 font-weight:bold;
 margin-top:10px;
 display:inline-block;
}

.photo-wrap{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-top:10px;
}

.photo-wrap img{
 width:80px;
 height:80px;
 object-fit:cover;
 border-radius:10px;
 cursor:pointer;
 border:2px solid #e2e8f0;
}

.pdf-wrap{
 margin-top:10px;
 display:flex;
 gap:6px;
 flex-wrap:wrap;
}

.pdf-wrap a{
 background:#0f172a;
 color:#fff;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
 text-decoration:none;
}

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.7);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.modal img{
 max-width:90vw;
 max-height:85vh;
 border-radius:12px;
}

.edit-modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.edit-box{
 background:#fff;
 padding:20px;
 border-radius:16px;
 width:400px;
 max-width:95%;
}

.edit-box input,
.edit-box select{
 width:100%;
 margin-bottom:10px;
 padding:8px;
}
</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <div style="display:flex;gap:10px">
    <button onclick="toggleFullscreen()">Modo TV</button>
    <button id="btnReload">
      <span class="btn-text">Recargar</span>
      <span class="btn-loader"></span>
    </button>
  </div>
</div>

<div class="filters">
  <input type="text" id="fBuscar" placeholder="Buscar pedido, cliente o comuna">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
</div>

<div class="stats">
  <div class="stat-box">Pedidos: <span id="totalPedidos">0</span></div>
  <div class="stat-box">Cajas: <span id="totalCajas">0</span></div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[];
let PREV_IDS=[];

const btnReload=document.getElementById("btnReload");

function setLoading(btn,state){
 btn.disabled=state;
 btn.classList.toggle("loading",state);
}

function cleanStatus(s){
 return (s||"").replace(/\s+/g,"_");
}

async function load(){
 setLoading(btnReload,true);
 const r=await fetch(API);
 RAW=await r.json();

 const ids=RAW.map(x=>x._row);
 if(PREV_IDS.length && ids.some(id=>!PREV_IDS.includes(id))){
   new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
 }
 PREV_IDS=ids;

 applyFilter();
 setLoading(btnReload,false);
}

function applyFilter(){
 const texto=fBuscar.value.toLowerCase();
 const status=fStatus.value;

 const data=RAW.filter(r=>{
   const combinado=(r.pedido+" "+r.cliente+" "+r.comuna).toLowerCase();
   if(texto && !combinado.includes(texto)) return false;
   if(status && r.status!==status) return false;
   return true;
 });

 totalPedidos.textContent=data.length;
 totalCajas.textContent=data.reduce((s,r)=>s+Number(r.etiquetas||0),0);

 render(data);
}

function render(data){
 cardsGrid.innerHTML="";
 data.forEach(r=>{
   const st=cleanStatus(r.status);
   const fotos=(r.foto||"").split("|").filter(u=>u.startsWith("http"));
   const pdfs=(r.pdf||"").split("|").filter(u=>u.startsWith("http"));

   const card=document.createElement("div");
   card.className="card card-"+st;

   card.innerHTML=`
     <h3>${r.pedido||""}</h3>
     <div class="status status-${st}">${r.status||""}</div>
     <div style="margin-top:8px">
       👤 ${r.cliente||""}<br>
       📍 ${r.direccion||""} (${r.comuna||""})
     </div>
     <div class="cajas">📦 ${r.etiquetas||0} CAJAS</div>
     <div class="photo-wrap">
       ${fotos.map(f=>`<img src="${f}" onclick="showFoto('${f}')">`).join("")}
     </div>
     <div class="pdf-wrap">
       ${pdfs.map(p=>`
         <a href="${p}" target="_blank">Ver</a>
         <a href="${p}" download>Descargar</a>
       `).join("")}
     </div>
   `;
   cardsGrid.appendChild(card);
 });
}

function showFoto(url){
 fotoGrande.src=url;
 fotoModal.style.display="flex";
}

function toggleFullscreen(){
 if(!document.fullscreenElement){
   document.documentElement.requestFullscreen();
 }else{
   document.exitFullscreen();
 }
}

btnReload.onclick=load;
fBuscar.oninput=applyFilter;
fStatus.onchange=applyFilter;

setInterval(load,15000);
load();
</script>

</body>
</html>
