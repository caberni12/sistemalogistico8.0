<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
 --turq:#14b8a6;
 --turq-dark:#0d9488;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Inter,Arial;
 background:var(--bg);
 padding:20px;
 color:var(--text);
}

/* HEADER */
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:25px;
 flex-wrap:wrap;
 gap:10px;
}

.counter{font-weight:600}

/* BOTONES */
button{
 border:0;
 border-radius:12px;
 padding:10px 14px;
 font-size:13px;
 font-weight:600;
 cursor:pointer;
 background:var(--turq);
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:6px;
 position:relative;
}

button:hover{background:var(--turq-dark)}
button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
 display:none;
 width:16px;
 height:16px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* FILTROS */
.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:25px;
}
input,select{
 padding:10px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 font-size:14px;
}

/* GRID */
.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
 gap:22px;
}

.card{
 background:var(--card);
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
 display:flex;
 flex-direction:column;
}

.card.PENDIENTE{border-left-color:#3b82f6}
.card.EN\ RUTA{border-left-color:#f97316}
.card.RECIBIDO{border-left-color:#ef4444}
.card.ENTREGADO{border-left-color:#22c55e}
.card.CANCELADO{border-left-color:#9ca3af}

/* STATUS */
.status{
 padding:5px 10px;
 border-radius:8px;
 font-size:12px;
 font-weight:700;
 background:#000;
}

.status.PENDIENTE{color:#3b82f6}
.status.EN\ RUTA{color:#f97316}
.status.RECIBIDO{color:#ef4444}
.status.ENTREGADO{color:#22c55e}
.status.CANCELADO{color:#9ca3af}

/* FOTO */
.photo-wrap{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin:10px 0;
}
.photo-wrap img{
 width:70px;
 height:70px;
 object-fit:cover;
 border-radius:10px;
 cursor:pointer;
 border:1px solid var(--border);
}

/* PDF */
.pdf-wrap a{
 font-size:13px;
 font-weight:600;
 text-decoration:none;
 color:var(--turq-dark);
 display:block;
 margin-bottom:4px;
}

/* ACCIONES */
.card-actions{
 display:flex;
 gap:8px;
 margin-top:12px;
}
.card-actions button{flex:1}

/* MODAL */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.5);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}
.modal-content{
 background:#fff;
 padding:20px;
 border-radius:16px;
 width:400px;
 max-width:95%;
}
.modal-content input,
.modal-content select{
 width:100%;
 margin-bottom:10px;
}

/* MODAL FOTO */
.foto-modal img{
 max-width:90vw;
 max-height:80vh;
 border-radius:12px;
}

</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <div class="counter" id="counter">Total: 0</div>
  <button id="btnReload">
    <span class="btn-text">🔄 Recargar</span>
    <span class="btn-loader"></span>
  </button>
</div>

<div class="filters">
  <input id="search" placeholder="Buscar pedido o cliente">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<!-- MODAL EDIT -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Editar Pedido</h3>
    <input id="mPedido">
    <input id="mCliente">
    <input id="mDireccion">
    <input id="mComuna">
    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>RECIBIDO</option>
      <option>ENTREGADO</option>
      <option>CANCELADO</option>
    </select>
    <button id="btnGuardar">
      <span class="btn-text">💾 Guardar</span>
      <span class="btn-loader"></span>
    </button>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<!-- MODAL FOTO -->
<div class="modal foto-modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<audio id="notifSound">
 <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[];
let PREVIOUS_IDS=[];
let EDIT_ROW=null;
let autoRefresh;

/* AUTO REFRESH */
function startAuto(){ autoRefresh=setInterval(load,15000); }
function stopAuto(){ clearInterval(autoRefresh); }

/* LOAD */
async function load(){
 setLoading(btnReload,true);
 const r=await fetch(API);
 const data=await r.json();

 // detectar nuevos pedidos
 const newIDs=data.map(x=>x._row);
 const hasNew=newIDs.some(id=>!PREVIOUS_IDS.includes(id));

 if(hasNew && PREVIOUS_IDS.length){
  document.getElementById("notifSound").play();
 }

 PREVIOUS_IDS=newIDs;
 RAW=data;

 render();
 setLoading(btnReload,false);
}

/* RENDER */
function render(){
 cardsGrid.innerHTML="";
 counter.textContent="Total: "+RAW.length;

 RAW.forEach(r=>{
  const card=document.createElement("div");
  card.className="card "+r.status;

  const fotos=(r.foto||"").split("|").filter(u=>u.startsWith("http"));
  const pdfs=(r.pdf||"").split("|").filter(u=>u.startsWith("http"));

  card.innerHTML=`
   <div style="display:flex;justify-content:space-between;margin-bottom:8px">
     <strong>${r.pedido||""}</strong>
     <span class="status ${r.status}">${r.status||""}</span>
   </div>

   👤 ${r.cliente||""}<br>
   📍 ${r.direccion||""} (${r.comuna||""})<br>

   <div class="photo-wrap">
     ${fotos.map(f=>`<img src="${f.replace(/=s\\d+$/,'=s200')}" onclick="showFoto('${f.replace(/=s\\d+$/,'=s1600')}')">`).join("")}
   </div>

   <div class="pdf-wrap">
     ${pdfs.map(p=>`<a href="${p}" target="_blank">📄 Ver PDF</a>`).join("")}
   </div>

   <div class="card-actions">
     <button onclick="openEdit(${r._row})">
       <span class="btn-text">✏️</span>
       <span class="btn-loader"></span>
     </button>
   </div>
  `;
  cardsGrid.appendChild(card);
 });
}

/* FOTO */
function showFoto(url){
 fotoGrande.src=url;
 fotoModal.style.display="flex";
}

/* EDIT */
function openEdit(row){
 stopAuto();
 const r=RAW.find(x=>x._row==row);
 EDIT_ROW=row;

 mPedido.value=r.pedido||"";
 mCliente.value=r.cliente||"";
 mDireccion.value=r.direccion||"";
 mComuna.value=r.comuna||"";
 mStatus.value=r.status||"";

 editModal.style.display="flex";
}

function closeModal(){
 editModal.style.display="none";
 startAuto();
}

/* GUARDAR */
btnGuardar.onclick=async()=>{
 setLoading(btnGuardar,true);
 await fetch(API,{
  method:"POST",
  body:JSON.stringify({
   action:"update",
   row:EDIT_ROW,
   "PEDIDO":mPedido.value,
   "CLIENTE":mCliente.value,
   "DIRECCION":mDireccion.value,
   "COMUNA":mComuna.value,
   "STATUS":mStatus.value
  })
 });
 setLoading(btnGuardar,false);
 closeModal();
 load();
};

/* LOADER */
function setLoading(btn,state){
 btn.disabled=state;
 btn.classList.toggle("loading",state);
}

btnReload.onclick=load;
search.oninput=render;
fStatus.onchange=render;

startAuto();
load();

</script>

</body>
</html>
