<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --bg-tv:#0f172a;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
 --turq:#14b8a6;
 --turq-dark:#0d9488;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:var(--bg);
 padding:20px;
 color:var(--text);
 transition:.3s;
}

body.tv-mode{
 background:var(--bg-tv);
 color:#fff;
 padding:30px;
}

/* HEADER */
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:25px;
 flex-wrap:wrap;
 gap:10px;
}

button{
 border:0;
 border-radius:12px;
 padding:8px 12px;
 font-size:13px;
 font-weight:600;
 cursor:pointer;
 background:var(--turq);
 color:#fff;
 display:flex;
 align-items:center;
 gap:6px;
}

button:hover{background:var(--turq-dark)}

select{
 padding:8px 12px;
 border-radius:10px;
 border:1px solid var(--border);
}

/* GRID */
.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
 gap:22px;
}

/* TARJETA */
.card{
 background:var(--card);
 border-radius:18px;
 padding:20px;
 box-shadow:0 8px 20px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
}

.card.PENDIENTE{border-left-color:#3b82f6}
.card.EN\ RUTA{border-left-color:#f97316}
.card.RECIBIDO{border-left-color:#ef4444}
.card.ENTREGADO{border-left-color:#22c55e}
.card.CANCELADO{border-left-color:#9ca3af}

.status{
 background:#000;
 padding:6px 12px;
 border-radius:8px;
 font-size:12px;
 font-weight:bold;
 display:inline-block;
 margin-top:6px;
}

.status.PENDIENTE{color:#3b82f6}
.status.EN\ RUTA{color:#f97316}
.status.RECIBIDO{color:#ef4444}
.status.ENTREGADO{color:#22c55e}
.status.CANCELADO{color:#9ca3af}

.cajas{
 background:#f1f5f9;
 padding:8px 12px;
 border-radius:12px;
 font-weight:bold;
 margin-top:10px;
 display:inline-block;
}

.photo-wrap{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-top:10px;
}

.photo-wrap img{
 width:70px;
 height:70px;
 object-fit:cover;
 border-radius:10px;
 cursor:pointer;
}

.pdf-wrap{
 margin-top:10px;
 display:flex;
 gap:6px;
 flex-wrap:wrap;
}

.pdf-wrap a{
 background:#0f172a;
 color:#fff;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
 text-decoration:none;
}

/* MODAL GENERAL */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.modal-content{
 background:#fff;
 padding:20px;
 border-radius:16px;
 width:400px;
 max-width:95%;
}

.modal-content input,
.modal-content select{
 width:100%;
 margin-bottom:10px;
 padding:8px;
}

/* MODAL FOTO */
.foto-modal img{
 max-width:90vw;
 max-height:80vh;
 border-radius:12px;
}

</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <div style="display:flex;gap:10px">
    <button onclick="toggleTV()">📺 Modo TV</button>
    <button onclick="load()">🔄 Recargar</button>
  </div>
</div>

<div style="margin-bottom:20px">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<!-- MODAL FOTO -->
<div class="modal foto-modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<!-- MODAL EDITAR -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Editar Pedido</h3>
    <input id="mPedido">
    <input id="mCliente">
    <input id="mDireccion">
    <input id="mComuna">
    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>RECIBIDO</option>
      <option>ENTREGADO</option>
      <option>CANCELADO</option>
    </select>
    <button onclick="saveEdit()">Guardar</button>
    <button onclick="closeEdit()">Cerrar</button>
  </div>
</div>

<audio id="notifSound">
 <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[];
let FILT=[];
let PREVIOUS_IDS=[];
let EDIT_ROW=null;
let tvScrollInterval=null;

/* AUTO RECARGA */
setInterval(load,15000);

async function load(){
 const r=await fetch(API);
 const data=await r.json();

 const newIDs=data.map(x=>x._row);
 const hasNew=newIDs.some(id=>!PREVIOUS_IDS.includes(id));

 if(hasNew && PREVIOUS_IDS.length){
  document.getElementById("notifSound").play();
 }

 PREVIOUS_IDS=newIDs;
 RAW=data;
 applyFilter();
}

function applyFilter(){
 const status=fStatus.value;
 FILT = !status ? RAW : RAW.filter(r=>r.status===status);
 render();
}

fStatus.onchange=applyFilter;

function render(){
 cardsGrid.innerHTML="";

 FILT.forEach(r=>{
  const card=document.createElement("div");
  card.className="card "+r.status;

  const fotos=(r.foto||"").split("|").filter(u=>u.startsWith("http"));
  const pdfs=(r.pdf||"").split("|").filter(u=>u.startsWith("http"));

  card.innerHTML=`
   <h3>${r.pedido||""}</h3>
   <div class="status ${r.status}">${r.status||""}</div>
   <div style="margin-top:8px">
     👤 ${r.cliente||""}<br>
     📍 ${r.direccion||""} (${r.comuna||""})
   </div>
   <div class="cajas">📦 ${r.etiquetas || 0} CAJAS</div>

   <div class="photo-wrap">
     ${fotos.map(f=>`<img src="${f.replace(/=s\\d+$/,'=s300')}" onclick="showFoto('${f.replace(/=s\\d+$/,'=s1600')}')">`).join("")}
   </div>

   <div class="pdf-wrap">
     ${pdfs.map(p=>`
       <a href="${p}" target="_blank">📄 Ver</a>
       <a href="${p}" download>⬇ Descargar</a>
     `).join("")}
   </div>

   <div style="margin-top:12px">
     <button onclick="openEdit(${r._row})">✏️ Editar</button>
   </div>
  `;
  cardsGrid.appendChild(card);
 });
}

/* FOTO */
function showFoto(url){
 fotoGrande.src=url;
 fotoModal.style.display="flex";
}

/* EDITAR */
function openEdit(row){
 const r=RAW.find(x=>x._row==row);
 EDIT_ROW=row;

 mPedido.value=r.pedido||"";
 mCliente.value=r.cliente||"";
 mDireccion.value=r.direccion||"";
 mComuna.value=r.comuna||"";
 mStatus.value=r.status||"";

 editModal.style.display="flex";
}

function closeEdit(){
 editModal.style.display="none";
}

async function saveEdit(){
 await fetch(API,{
  method:"POST",
  body:JSON.stringify({
   action:"update",
   row:EDIT_ROW,
   "PEDIDO":mPedido.value,
   "CLIENTE":mCliente.value,
   "DIRECCION":mDireccion.value,
   "COMUNA":mComuna.value,
   "STATUS":mStatus.value
  })
 });

 closeEdit();
 load();
}

/* MODO TV */
function toggleTV(){
 document.body.classList.toggle("tv-mode");

 if(document.body.classList.contains("tv-mode")){
  document.documentElement.requestFullscreen().catch(()=>{});
  tvScrollInterval=setInterval(()=>{
   window.scrollBy({top:600,behavior:'smooth'});
   if(window.innerHeight + window.scrollY >= document.body.offsetHeight){
    window.scrollTo({top:0,behavior:'smooth'});
   }
  },8000);
 }else{
  document.exitFullscreen().catch(()=>{});
  clearInterval(tvScrollInterval);
  window.scrollTo({top:0});
 }
}

load();

</script>

</body>
</html>
