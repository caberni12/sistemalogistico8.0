<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PEDIDOS EN CURSO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --border:#e2e8f0;
 --text:#0f172a;
 --primary:#14b8a6;
 --primary-dark:#0d9488;
 --danger:#dc2626;
}

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Arial, sans-serif;
 background:var(--bg);
 padding:20px;
 color:var(--text);
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:15px;
}

button{
 border:0;
 border-radius:12px;
 padding:8px 14px;
 font-weight:600;
 cursor:pointer;
 background:var(--primary);
 color:#fff;
 display:flex;
 align-items:center;
 gap:6px;
}

button:hover{background:var(--primary-dark)}

button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
 display:none;
 width:16px;
 height:16px;
 border:3px solid rgba(255,255,255,.4);
 border-top:3px solid #fff;
 border-radius:50%;
 animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.filters{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:15px;
}

input,select{
 padding:8px 12px;
 border-radius:10px;
 border:1px solid var(--border);
}

.stats{
 display:flex;
 gap:20px;
 margin-bottom:20px;
 font-weight:bold;
}

.cards-grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
 gap:20px;
}

.card{
 background:var(--card);
 border-radius:16px;
 padding:18px;
 box-shadow:0 6px 18px rgba(0,0,0,.08);
 border-left:6px solid #ccc;
}

.card-EN_RUTA{border-left-color:var(--danger)}

.status{
 padding:6px 12px;
 border-radius:20px;
 font-weight:700;
 color:#fff;
 display:inline-block;
 margin-top:6px;
}

.status-EN_RUTA{background:var(--danger)}
.status-PENDIENTE{background:#2563eb}
.status-RECIBIDO{background:#7c3aed}
.status-ENTREGADO{background:#16a34a}
.status-CANCELADO{background:#6b7280}

.photo-wrap img{
 width:75px;
 height:75px;
 object-fit:cover;
 border-radius:10px;
 cursor:pointer;
 margin-top:8px;
}

.pdf-wrap a{
 background:#111827;
 color:#fff;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
 text-decoration:none;
 margin-right:6px;
}

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.7);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.modal img{
 max-width:90vw;
 max-height:85vh;
 border-radius:12px;
}

/* EDIT MODAL */
.edit-modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

.edit-box{
 background:#fff;
 padding:20px;
 border-radius:16px;
 width:400px;
 max-width:95%;
}

.edit-box input,
.edit-box select{
 width:100%;
 margin-bottom:10px;
 padding:8px;
}
</style>
</head>
<body>

<div class="header">
  <h2>📋 PEDIDOS EN CURSO</h2>
  <div style="display:flex;gap:10px">
    <button onclick="toggleFullscreen()">Modo TV</button>
    <button id="btnReload">
      <span class="btn-text">Recargar</span>
      <span class="btn-loader"></span>
    </button>
  </div>
</div>

<div class="filters">
  <input type="text" id="fBuscar" placeholder="Buscar pedido, cliente o comuna">
  <select id="fStatus">
    <option value="">Todos</option>
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
  </select>
</div>

<div class="stats">
  <div>Pedidos: <span id="totalPedidos">0</span></div>
  <div>Cajas: <span id="totalCajas">0</span></div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="modal" id="fotoModal" onclick="this.style.display='none'">
  <img id="fotoGrande">
</div>

<div class="edit-modal" id="editModal">
  <div class="edit-box">
    <h3>Editar Pedido</h3>
    <input id="mPedido">
    <input id="mCliente">
    <input id="mDireccion">
    <input id="mComuna">
    <input type="number" id="mCajas">
    <select id="mStatus">
      <option>PENDIENTE</option>
      <option>EN RUTA</option>
      <option>RECIBIDO</option>
      <option>ENTREGADO</option>
      <option>CANCELADO</option>
    </select>

    <button id="btnGuardar">
      <span class="btn-text">Guardar</span>
      <span class="btn-loader"></span>
    </button>
    <button onclick="closeEdit()">Cerrar</button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxWQTDZK4Cc3abLR4ec2hoL1YGTquPmH1ucXm6WAIXuWJX3X9HJD1FiJpAaUtpm0pwFtQ/exec";

let RAW=[], FILT=[];
let visibleCount=0;
const CHUNK=50;
let EDIT_ROW=null;

const btnReload=document.getElementById("btnReload");
const btnGuardar=document.getElementById("btnGuardar");

function setLoading(btn,state){
 btn.disabled=state;
 btn.classList.toggle("loading",state);
}

function cleanStatus(s){
 return (s||"").replace(/\s+/g,"_");
}

async function load(){
 setLoading(btnReload,true);
 const r=await fetch(API);
 RAW=await r.json();
 applyFilter();
 setLoading(btnReload,false);
}

function applyFilter(){
 const texto=fBuscar.value.toLowerCase();
 const status=fStatus.value;

 FILT=RAW.filter(r=>{
   const combinado=(r.pedido+" "+r.cliente+" "+r.comuna).toLowerCase();
   if(texto && !combinado.includes(texto)) return false;
   if(status && r.status!==status) return false;
   return true;
 });

 totalPedidos.textContent=FILT.length;
 totalCajas.textContent=FILT.reduce((s,r)=>s+Number(r.etiquetas||0),0);

 visibleCount=0;
 cardsGrid.innerHTML="";
 renderMore();
}

function renderMore(){
 const fragment=document.createDocumentFragment();
 const slice=FILT.slice(visibleCount, visibleCount+CHUNK);

 slice.forEach(r=>{
   const st=cleanStatus(r.status);
   const fotos=(r.foto||"").split("|").filter(u=>u.startsWith("http"));
   const pdfs=(r.pdf||"").split("|").filter(u=>u.startsWith("http"));

   const card=document.createElement("div");
   card.className="card card-"+st;

   card.innerHTML=`
     <h3>${r.pedido||""}</h3>
     <div class="status status-${st}">${r.status||""}</div>
     <div>👤 ${r.cliente||""}</div>
     <div>📍 ${r.direccion||""} (${r.comuna||""})</div>
     <div>📦 ${r.etiquetas||0} CAJAS</div>
     <div class="photo-wrap">
       ${fotos.map(f=>`<img src="${f}" onclick="showFoto('${f}')">`).join("")}
     </div>
     <div class="pdf-wrap">
       ${pdfs.map(p=>`
         <a href="${p}" target="_blank">Ver</a>
         <a href="${p}" download>Descargar</a>
       `).join("")}
     </div>
     <div style="margin-top:10px">
       <button onclick="openEdit(${r._row})">Editar</button>
     </div>
   `;
   fragment.appendChild(card);
 });

 cardsGrid.appendChild(fragment);
 visibleCount+=CHUNK;
}

function openEdit(row){
 const r=RAW.find(x=>x._row==row);
 EDIT_ROW=row;

 mPedido.value=r.pedido||"";
 mCliente.value=r.cliente||"";
 mDireccion.value=r.direccion||"";
 mComuna.value=r.comuna||"";
 mCajas.value=r.etiquetas||1;
 mStatus.value=r.status||"";

 editModal.style.display="flex";
}

function closeEdit(){
 editModal.style.display="none";
}

async function guardar(){
 setLoading(btnGuardar,true);
 await fetch(API,{
   method:"POST",
   body:JSON.stringify({
     action:"update",
     row:EDIT_ROW,
     PEDIDO:mPedido.value,
     CLIENTE:mCliente.value,
     DIRECCION:mDireccion.value,
     COMUNA:mComuna.value,
     ETIQUETAS:mCajas.value,
     STATUS:mStatus.value
   })
 });
 closeEdit();
 load();
 setLoading(btnGuardar,false);
}

function showFoto(url){
 fotoGrande.src=url;
 fotoModal.style.display="flex";
}

function toggleFullscreen(){
 if(!document.fullscreenElement){
   document.documentElement.requestFullscreen();
 }else{
   document.exitFullscreen();
 }
}

window.addEventListener("scroll",()=>{
 if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
   if(visibleCount < FILT.length){
     renderMore();
   }
 }
});

let debounce;
fBuscar.oninput=()=>{
 clearTimeout(debounce);
 debounce=setTimeout(applyFilter,300);
};

fStatus.onchange=applyFilter;
btnReload.onclick=load;
btnGuardar.onclick=guardar;

setInterval(load,15000);
load();
</script>

</body>
</html>
