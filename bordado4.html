<!DOCTYPE html><html lang="es">
<head><meta charset="UTF-8">
<title>Sistema Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1"><style>

:root{
--primary:#14b8a6;
--primary-dark:#0d9488;
--danger:#dc2626;
--warning:#facc15;
--bg:#f8fafc;
--card:#ffffff;
--shadow:0 10px 25px rgba(0,0,0,.08);
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:20px;
}

/* BOTONES */

button{
border:0;
border-radius:12px;
padding:9px 16px;
font-weight:700;
cursor:pointer;
background:var(--primary);
color:#fff;
display:flex;
align-items:center;
gap:6px;
transition:.2s;
}

button:hover{
background:var(--primary-dark);
transform:scale(1.04);
}

button.loading .btn-text{display:none}
button.loading .btn-loader{display:inline-block}

.btn-loader{
display:none;
width:16px;
height:16px;
border:3px solid rgba(255,255,255,.4);
border-top:3px solid #fff;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* FILTROS */

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

input,select,textarea{
padding:10px 12px;
border-radius:10px;
border:1px solid #e2e8f0;
width:100%;
font-size:14px;
box-sizing:border-box;
}

/* LABEL */

.form-grid label{
display:block;
font-size:12px;
font-weight:700;
margin-bottom:4px;
color:#374151;
}

/* CONTADORES */

.stats{
display:flex;
gap:30px;
margin-bottom:20px;
font-weight:bold;
font-size:18px;
}

/* TARJETAS */

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;
}

.card{
background:var(--card);
border-radius:18px;
padding:20px;
box-shadow:var(--shadow);
border-left:8px solid #ccc;
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 16px 35px rgba(0,0,0,.12);
}

.card-alerta{background:#fef9c3;}
.card-atraso{background:#fee2e2;border-left-color:#dc2626;}

.pedido-numero{
font-size:32px;
font-weight:900;
margin-bottom:6px;
}

.cliente-destacado{
font-size:22px;
font-weight:800;
margin-bottom:10px;
}

/* CAJAS */

.cajas-box{
background:#111827;
color:#fff;
text-align:center;
padding:12px;
border-radius:14px;
margin-top:10px;
}

.cajas-box span{
font-size:36px;
font-weight:900;
display:block;
}

/* FOTOS */

.photo-wrap{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:10px;
}

.photo-wrap img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* PDF */

.pdf-wrap{
margin-top:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
}

.pdf-wrap a{
background:#0f172a;
color:#fff;
padding:6px 10px;
border-radius:8px;
font-size:12px;
text-decoration:none;
}

/* MAPA */

.map-container{
display:none;
margin-top:10px;
}

.map-container iframe{
width:100%;
height:220px;
border-radius:12px;
border:0;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.modal-box{
background:#fff;
padding:30px;
border-radius:18px;
width:1200px;
max-width:96%;
max-height:92vh;
overflow:auto;
box-shadow:0 20px 40px rgba(0,0,0,.2);
}

/* GRID FORM */

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-top:15px;
}

.full{
grid-column:1 / -1;
}

/* BOTONES MODAL */

.modal-actions{
display:flex;
justify-content:flex-end;
gap:12px;
margin-top:20px;
flex-wrap:wrap;
}

.modal-actions button{
min-width:120px;
justify-content:center;
}

.btn-close{
background:#6b7280;
}

.btn-close:hover{
background:#4b5563;
}

/* RESPONSIVE */

@media (max-width:1000px){

.form-grid{
grid-template-columns:repeat(2,1fr);
}

.modal-box{
width:95%;
}

}

@media (max-width:600px){

.form-grid{
grid-template-columns:1fr;
}

.cards-grid{
grid-template-columns:1fr;
}

}

</style></head><body><div class="header"><h2>🚚 Sistema Logístico</h2><div style="display:flex;gap:10px"><button onclick="toggleFullscreen()">Modo TV</button>

<button id="btnReload">
<span class="btn-text">Recargar</span>
<span class="btn-loader"></span>
</button></div></div><!-- FILTROS --><div class="filters"><input id="fBuscar" placeholder="Buscar pedido, cliente, comuna"><select id="fStatus">
<option value="">Todos</option>
<option>PENDIENTE</option>
<option>EN RUTA</option>
<option>RECIBIDO</option>
<option>ENTREGADO</option>
<option>CANCELADO</option>
</select><input type="date" id="fDesde">
<input type="date" id="fHasta"></div><!-- CONTADORES --><div class="stats"><div>Pedidos: <span id="totalPedidos">0</span></div>
<div>Cajas: <span id="totalCajas">0</span></div></div><!-- TARJETAS --><div class="cards-grid" id="cardsGrid"></div><!-- MODAL EDICION --><div class="modal" id="editModal"><div class="modal-box"><h3>Editar Pedido</h3><div class="form-grid"><div>
<label>Fecha Ingreso</label>
<input id="mFechaIngreso" type="date">
</div><div>
<label>Número Pedido</label>
<input id="mPedido">
</div><div>
<label>Tipo Documento</label>
<input id="mTipoDocumento">
</div><div>
<label>Número Documento</label>
<input id="mNumeroDocumento">
</div><div>
<label>Cliente</label>
<input id="mCliente">
</div><div>
<label>Dirección</label>
<input id="mDireccion">
</div><div>
<label>Comuna</label>
<input id="mComuna">
</div><div>
<label>Transporte</label>
<input id="mTransporte">
</div><div>
<label>Cajas</label>
<input id="mCajas" type="number">
</div><div>
<label>Responsable</label>
<input id="mResponsable">
</div><div>
<label>Fecha Entrega</label>
<input id="mFechaEntrega" type="date">
</div><div>
<label>Status Pedido</label>
<select id="mStatus">
<option>PENDIENTE</option>
<option>EN RUTA</option>
<option>RECIBIDO</option>
<option>ENTREGADO</option>
<option>CANCELADO</option>
</select>
</div><div>
<label>Status Entrega</label>
<input id="mStatusEntrega">
</div><div>
<label>Semáforo</label>
<input id="mSemaforo">
</div><div>
<label>Días Atraso</label>
<input id="mDiasAtraso">
</div><div class="full">
<label>Observaciones</label>
<textarea id="mObservaciones" rows="3"></textarea>
</div><div>
<label>URL Foto</label>
<input id="mFoto">
</div><div>
<label>PDF Documento</label>
<input id="mPDF">
</div><div>
<label>PDF Traslado</label>
<input id="mPDFTraslado">
</div></div><div class="modal-actions"><button id="btnGuardar">
<span class="btn-text">Guardar</span>
<span class="btn-loader"></span>
</button><button class="btn-close" onclick="closeEdit()">Cerrar</button>

</div></div></div><audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script><script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script><script>

function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}
}

</script><script src="envio2.js"></script></body>
</html>
