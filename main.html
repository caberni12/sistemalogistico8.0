<!DOCTYPE html>
<html lang="es">
<head>

<!-- ================= PWA ================= -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>

<!-- VIEWPORT (más zoom real) -->
<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* =====================================================
   VARIABLES
===================================================== */
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
}

/* =====================================================
   RESET GLOBAL
===================================================== */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

html,body{
 margin:0;
 padding:0;
 width:100%;
 height:100%;
 background:var(--bg);
 color:var(--text);
 overflow:hidden; /* nunca scroll lateral */
}

/* =====================================================
   APP
===================================================== */
.app{
 display:flex;
 flex-direction:column;
 min-height:100dvh;
 overflow:hidden;
}

/* =====================================================
   HEADER (MÓVIL PRIMERO)
===================================================== */
header{
 position:sticky;
 top:0;
 z-index:20;
 background:#fff;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 14px rgba(0,0,0,.06);
 padding:10px 12px;

 display:flex;
 flex-direction:column; /* CLAVE */
 gap:10px;

 width:100%;
 max-width:100%;
 overflow:hidden;
}

/* ----- FILA SUPERIOR ----- */
.header-left{
 display:flex;
 align-items:center;
 gap:8px;
 min-width:0;
}

#btnMenu{
 width:38px;
 height:38px;
 border-radius:10px;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
 font-size:18px;
 border:none;
 flex-shrink:0;
 cursor:pointer;
}

header h1{
 margin:0;
 font-size:15px;
 font-weight:700;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

/* ----- FILA INFO ----- */
.header-info{
 display:flex;
 flex-wrap:wrap;
 gap:8px;
 font-size:11px;
 color:var(--muted);
}

/* ----- FILA BOTONES ----- */
header .right{
 display:flex;
 gap:8px;
}

header .right button{
 flex:1;
}

/* =====================================================
   BOTONES
===================================================== */
button{
 border:none;
 border-radius:var(--radius);
 padding:8px 12px;
 font-weight:600;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 gap:6px;
 box-shadow:0 6px 18px rgba(0,0,0,.12);
 font-size:13px;
 white-space:nowrap;
}

.btn-primary{
 background:linear-gradient(135deg,#60a5fa,#2563eb);
 color:#fff;
}

.btn-danger{
 background:linear-gradient(135deg,#f87171,#dc2626);
 color:#fff;
}

.btn-ghost{
 background:#fff;
 border:1px solid var(--border);
 box-shadow:none;
}

/* =====================================================
   MAIN (SCROLL CONTROLADO)
===================================================== */
.main{
 flex:1;
 overflow-y:auto;
 overflow-x:hidden;
 -webkit-overflow-scrolling:touch;
}

/* =====================================================
   MAPA
===================================================== */
#mapaBox{
 width:100%;
 max-width:100%;
 padding:0;
 margin:0;
}

#mapa{
 width:100%;
 min-height:360px;
}

/* =====================================================
   TARJETA INFO
===================================================== */
#dashboardMapa{
 margin:12px;
 padding:14px;
 background:#fff;
 border-radius:16px;
 box-shadow:0 14px 30px rgba(0,0,0,.22);
 max-width:calc(100% - 24px);
 font-size:12px;
}

/* =====================================================
   MENU LATERAL
===================================================== */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100dvh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.35s ease;
 z-index:9997;
 display:flex;
 flex-direction:column;
}

.menu-lateral.open{
 left:0;
}

.menu-header{
 padding:16px;
 border-bottom:1px solid var(--border);
 display:flex;
 justify-content:space-between;
 font-weight:700;
}

.menu-items{
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
 overflow-y:auto;
}

.menu-item{
 padding:14px;
 border-radius:var(--radius);
 background:var(--hover);
 font-weight:600;
 cursor:pointer;
}

/* =====================================================
   VISOR
===================================================== */
.viewer{
 display:none;
 position:fixed;
 inset:0;
 background:#fff;
 z-index:9996;
 flex-direction:column;
}

.viewer-header{
 height:52px;
 padding:0 14px;
 border-bottom:1px solid var(--border);
 display:flex;
 align-items:center;
 justify-content:space-between;
}

.viewer iframe{
 flex:1;
 width:100%;
 border:none;
}

/* =====================================================
   LOADER
===================================================== */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.92);
 backdrop-filter:blur(4px);
 z-index:10000;
 display:none;
 align-items:center;
 justify-content:center;
 font-weight:600;
}

#progressBar{
 position:fixed;
 top:0;
 left:0;
 height:3px;
 width:0%;
 background:linear-gradient(90deg,#3b82f6,#14b8a6);
 z-index:10001;
 display:none;
}

/* =====================================================
   ESCRITORIO
===================================================== */
@media (min-width:769px){

 header{
   flex-direction:row;
   align-items:center;
 }

 .header-info{
   font-size:12px;
 }

 header .right{
   flex:0 0 auto;
 }
}
</style>
</head>

<body>

<div class="app">

<div id="loadingOverlay">Iniciando sistema…</div>
<div id="progressBar"></div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
  <div class="menu-header">
    <span>📦 Panel de Gestión</span>
    <button class="btn-ghost" onclick="toggleMenu()">✕</button>
  </div>
  <div id="menuModulos" class="menu-items"></div>
</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>
    <img id="logoEmpresa" style="height:36px;max-width:120px;display:none">
    <h1 id="tituloSistema">Panel Logístico</h1>
  </div>

  <div class="header-info">
    <div id="usuario"></div>
    <div id="conexionInfo"></div>
  </div>

  <div class="right">
    <button class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
    <button class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div id="mapaBox">
    <div id="mapa"></div>

    <div id="dashboardMapa">
      <strong>📍 Dirección</strong><br>
      <span id="dirTexto">Detectando…</span><br><br>

      <strong>🌐 Red</strong><br>
      <span id="netTexto">Detectando…</span><br><br>

      <strong>🚀 Velocidad</strong><br>
      <span id="speedTexto">0 km/h</span>
    </div>
  </div>
</div>

<!-- VISOR -->
<div id="viewer" class="viewer">
  <div class="viewer-header">
    <span id="viewerTitle"></span>
    <button class="btn-ghost" onclick="volver()">⬅ Volver</button>
  </div>
  <iframe id="frame"></iframe>
</div>

</div>

<!-- SCRIPTS -->
<script src="app-global.js"></script>
<script src="empresa-header.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
