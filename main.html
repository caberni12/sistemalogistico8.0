<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ================= LEAFLET ================= -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --border:#e2e8f0;
 --danger:#ef4444;
}

*{
 box-sizing:border-box;
 font-family:system-ui,Arial,sans-serif;
}

html,body{
 margin:0;
 padding:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* 🔥 CLAVE: ELIMINA EL MARCADOR ROJO DE LEAFLET 🔥 */
.leaflet-div-icon{
  background:none !important;
  border:none !important;
}

/* ================= HEADER ================= */
header{
 height:72px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:14px 18px;
 background:#ffffff;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 12px rgba(0,0,0,.04);
 gap:12px;
 position:relative;
 z-index:5;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 background:var(--accent);
 border:none;
 color:#fff;
 font-size:20px;
 padding:8px 14px;
 border-radius:10px;
 cursor:pointer;
}

header h1{
 margin:0;
 font-size:18px;
 font-weight:700;
}

header .right{
 display:flex;
 gap:14px;
 align-items:center;
 flex-wrap:wrap;
}

header .user{
 font-size:13px;
 color:var(--muted);
 line-height:1.4;
}

header button{
 background:var(--danger);
 color:#fff;
 border:none;
 padding:8px 14px;
 border-radius:8px;
 cursor:pointer;
 font-weight:600;
}

/* ================= MENU LATERAL SLIDER ================= */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100vh;
 background:#ffffff;
 box-shadow:4px 0 24px rgba(0,0,0,.18);
 transition:.35s ease;
 z-index:9997;
 display:flex;
 flex-direction:column;
}

.menu-lateral.open{ left:0; }

.menu-header{
 padding:16px;
 border-bottom:1px solid var(--border);
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-weight:700;
}

.menu-header button{
 background:none;
 border:none;
 font-size:18px;
 cursor:pointer;
}

.menu-items{
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
 overflow-y:auto;
 max-height:calc(100vh - 80px);
}

.menu-item{
 padding:12px 14px;
 border-radius:10px;
 background:#f8fafc;
 cursor:pointer;
 font-weight:600;
}

.menu-item:hover{ background:#e2e8f0; }

.menu-item.active{
 background:var(--accent);
 color:#fff;
}

/* ================= MAPA FULL ================= */
#mapaBox{
 width:100%;
 height:calc(100vh - 72px);
 position:relative;
}

#mapa{
 width:100%;
 height:100%;
}

/* ================= DASHBOARD MAPA ================= */
#dashboardMapa{
 position:absolute;
 bottom:20px;
 left:20px;
 background:#ffffff;
 border-radius:14px;
 padding:14px 16px;
 box-shadow:0 12px 30px rgba(0,0,0,.18);
 font-size:13px;
 z-index:500;
 max-width:340px;
}

#dashboardMapa strong{
 display:block;
 color:#0f172a;
 margin-bottom:4px;
}

#dashboardMapa span{
 color:#334155;
}

/* ================= PANEL OCULTO ================= */
#panel{ display:none; }

/* ================= VISOR ================= */
.viewer{
 display:none;
 flex-direction:column;
 height:100vh;
 background:#ffffff;
 position:fixed;
 inset:0;
 z-index:9996;
}

.viewer-header{
 border-bottom:1px solid var(--border);
 padding:12px 16px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.viewer-header button{
 background:var(--accent);
 color:#fff;
 border:none;
 padding:8px 14px;
 border-radius:8px;
 cursor:pointer;
}

.viewer iframe{
 flex:1;
 border:none;
 width:100%;
}

/* ================= LOADER ================= */
#progressBar{
 position:fixed;
 top:0;
 left:0;
 height:3px;
 width:0%;
 background:linear-gradient(90deg,#3b82f6,#14b8a6);
 z-index:9999;
 display:none;
}

#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.95);
 backdrop-filter:blur(4px);
 z-index:9998;
 display:none;
 align-items:center;
 justify-content:center;
 flex-direction:column;
 gap:16px;
}

#loadingOverlay span{
 font-size:14px;
 font-weight:600;
 color:#334155;
}

/* ================= MOBILE ================= */
@media (max-width:768px){
 header{
   flex-direction:column;
   height:auto;
 }
 header .right{
   width:100%;
   flex-direction:column;
 }
 header button{
   width:100%;
 }
 #mapaBox{
   height:calc(100vh - 120px);
 }
 #dashboardMapa{
   left:10px;
   right:10px;
   bottom:10px;
   max-width:none;
 }
}
</style>
</head>

<body>

<!-- ================= LOADER ================= -->
<div id="progressBar"></div>
<div id="loadingOverlay">
  <span id="loadingText">Iniciando sistema…</span>
</div>

<!-- ================= MENU SLIDER ================= -->
<div id="menuLateral" class="menu-lateral">
  <div class="menu-header">
    <span>📦 Módulos</span>
    <button onclick="toggleMenu()">✕</button>
  </div>
  <div id="menuModulos" class="menu-items"></div>
</div>

<!-- ================= HEADER ================= -->
<header>
  <div class="header-left">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>
    <h1 id="tituloSistema">Cargando sistema…</h1>
  </div>

  <div class="right">
    <div id="usuario" class="user"></div>
    <div id="conexionInfo" class="user">Conectando…</div>
    <button onclick="recargarPanel()" style="background:#3b82f6;">⟳ Recargar</button>
    <button onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
  </div>
</header>

<!-- ================= MAPA ================= -->
<div id="mapaBox">
  <div id="mapa"></div>

  <div id="dashboardMapa">
    <strong>📍 Dirección</strong>
    <span id="dirTexto">Detectando…</span>
    <br><br>
    <strong>🌐 Red</strong>
    <span id="netTexto">Detectando…</span>
    <br><br>
    <strong>🚀 Velocidad</strong>
    <span id="speedTexto">Midiendo…</span>
  </div>
</div>

<div id="panel"></div>

<div id="viewer" class="viewer">
  <div class="viewer-header">
    <span id="viewerTitle"></span>
    <button onclick="volver()">⬅ Volver</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="empresa.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

</body>
</html>
