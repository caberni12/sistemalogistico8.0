<!DOCTYPE html>
<html lang="es">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>

<meta name="viewport"
      content="width=device-width,
               initial-scale=0.9,
               maximum-scale=1,
               user-scalable=no">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
}

/* RESET */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

html,body{
 margin:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* APP */
.app{
 display:flex;
 flex-direction:column;
 height:100%;
}

/* HEADER */
header{
 position:sticky;
 top:0;
 z-index:20;
 background:#fff;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 14px rgba(0,0,0,.06);
 padding:12px 16px;
 display:flex;
 flex-wrap:wrap;
 gap:8px;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 width:40px;
 height:40px;
 font-size:20px;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
 border:none;
 border-radius:12px;
 cursor:pointer;
}

header h1{
 margin:0;
 font-size:17px;
 font-weight:700;
 white-space:nowrap;
}

.header-info{
 display:flex;
 gap:12px;
 align-items:center;
 font-size:12px;
 color:var(--muted);
 flex-wrap:wrap;
}

/* 👉 BOTONES EN PARALELO */
header .right{
 display:flex;
 gap:12px;
 width:100%;
}

header .right button{
 flex:1;
}

/* MAIN — SCROLL ANDROID REAL */
.main{
 flex:1;
 overflow-y:auto;
 -webkit-overflow-scrolling:touch;
}

/* MAPA */
#mapaBox{
 position:relative;
 width:100%;
}

#mapa{
 width:100%;
 min-height:320px;
}

/* DASHBOARD */
#dashboardMapa{
 margin:16px;
 background:#fff;
 border-radius:16px;
 padding:14px 16px;
 box-shadow:0 14px 30px rgba(0,0,0,.22);
 font-size:12px;
}

/* LOADER — NO SE TOCA */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.92);
 backdrop-filter:blur(4px);
 z-index:10000;
 display:none;
 align-items:center;
 justify-content:center;
 font-weight:600;
}

#progressBar{
 position:fixed;
 top:0;
 left:0;
 height:3px;
 width:0%;
 background:linear-gradient(90deg,#3b82f6,#14b8a6);
 z-index:10001;
 display:none;
}

/* MOBILE */
@media (max-width:768px){
 header{
   flex-direction:column;
   align-items:flex-start;
 }
}
</style>
</head>

<body>

<div class="app">

<!-- LOADER -->
<div id="loadingOverlay">Iniciando sistema…</div>
<div id="progressBar"></div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>

    <img id="logoEmpresa"
         alt="Logo Empresa"
         style="height:36px;max-width:120px;object-fit:contain;display:none;">

    <h1 id="tituloSistema">Panel Logístico</h1>
  </div>

  <div class="header-info">
    <div id="usuario"></div>
    <div id="conexionInfo"></div>
  </div>

  <div class="right">
    <button class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
    <button class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div id="mapaBox">
    <div id="mapa"></div>

    <div id="dashboardMapa">
      <strong>📍 Dirección</strong><br>
      <span id="dirTexto">Detectando…</span><br><br>

      <strong>🌐 Red</strong><br>
      <span id="netTexto">Detectando…</span><br><br>

      <strong>🚀 Velocidad</strong><br>
      <span id="speedTexto">0 km/h</span>
    </div>
  </div>
</div>

</div>

<!-- TUS SCRIPTS (SIN CAMBIOS) -->
<script src="app-global.js"></script>
<script src="empresa-header.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
