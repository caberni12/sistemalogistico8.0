<!DOCTYPE html>
<html lang="es">
<head>

<!-- ================= PWA ================= -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>

<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no">

<!-- LEAFLET (solo CSS, JS lo manejas en main.js) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
/* =====================================================
   VARIABLES
===================================================== */
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
}

/* RESET */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

html,body{
 margin:0;
 padding:0;
 width:100%;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* APP */
.app{
 display:flex;
 flex-direction:column;
 height:100vh;
 overflow:hidden;
}

/* HEADER */
header{
 position:sticky;
 top:0;
 z-index:100;
 background:#fff;
 border-bottom:1px solid var(--border);
 box-shadow:0 3px 10px rgba(0,0,0,.05);
 padding:10px 12px;

 display:grid;
 grid-template-columns:auto 1fr auto;
 gap:16px;
 align-items:center;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
 min-width:0;
}

#btnMenu{
 width:36px;
 height:36px;
 border-radius:10px;
 border:none;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
 font-size:18px;
 cursor:pointer;
}

#tituloSistema{
 font-size:18px;
 font-weight:800;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.header-info{
 display:flex;
 flex-direction:column;
 font-size:12px;
 color:var(--muted);
}

.right{
 display:flex;
 align-items:center;
 gap:8px;
}

/* BOTONES */
button{
 border:none;
 border-radius:var(--radius);
 padding:6px 12px;
 font-weight:700;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 gap:6px;
}

.btn-primary{
 background:linear-gradient(135deg,#60a5fa,#2563eb);
 color:#fff;
}

.btn-danger{
 background:linear-gradient(135deg,#f87171,#dc2626);
 color:#fff;
}

/* MAIN */
.main{
 flex:1;
 position:relative;
 overflow:hidden;
}

/* MAPA */
#mapaBox{
 position:absolute;
 inset:0;
}

#mapa{
 width:100%;
 height:100%;
}

/* TARJETA */
#dashboardMapa{
 background:#fff;
 border-radius:16px;
 padding:14px;
 box-shadow:0 18px 45px rgba(0,0,0,.28);
 font-size:12px;
}

#dashboardMapa.oculto{
 opacity:0;
 pointer-events:none;
 transform:translateY(-8px);
}

/* MENU LATERAL */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100vh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.35s ease;
 z-index:9997;
 display:flex;
 flex-direction:column;
}

.menu-lateral.open{ left:0; }

.menu-header{
 padding:14px;
 border-bottom:1px solid var(--border);
 display:flex;
 justify-content:space-between;
 font-weight:700;
}

.menu-items{
 padding:12px;
 display:flex;
 flex-direction:column;
 gap:8px;
 overflow-y:auto;
}

/* VISOR */
.viewer{
 display:none;
 position:fixed;
 inset:0;
 background:#fff;
 z-index:9996;
 flex-direction:column;
}

.viewer-header{
 height:48px;
 padding:0 12px;
 border-bottom:1px solid var(--border);
 display:flex;
 align-items:center;
 justify-content:space-between;
}

/* LOADER */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.92);
 backdrop-filter:blur(4px);
 z-index:10000;
 display:none;
 align-items:center;
 justify-content:center;
 font-weight:700;
}

/* ESCRITORIO */
@media (min-width:769px){
 #dashboardMapa{
   position:absolute;
   top:16px;
   left:50%;
   transform:translateX(-50%);
   max-width:900px;
   width:calc(100% - 32px);
   z-index:9999;
 }
}

/* MÓVIL */
@media (max-width:768px){
 .main{ overflow:auto; }
 #mapaBox{ position:relative; height:360px; }
 #dashboardMapa{ position:relative; margin:12px; }
 #btnToggle{ display:none; }
}
</style>
</head>

<body>

<div class="app">

<div id="loadingOverlay">Iniciando sistema…</div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
  <div class="menu-header">
    <span>📦 Panel de Gestión</span>
    <button onclick="toggleMenu()">✕</button>
  </div>
  <div id="menuModulos" class="menu-items"></div>
</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>
    <h1 id="tituloSistema">Panel Logístico</h1>
  </div>

  <div class="header-info">
    <div id="usuario"></div>
    <div id="conexionInfo"></div>
  </div>

  <div class="right">
    <button class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
    <button class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
    <button id="btnToggle">➖</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <div id="mapaBox">
    <div id="mapa"></div>
  </div>

  <div id="dashboardMapa">
    <strong>📍 Dirección</strong><br>
    <span id="dirTexto">Detectando…</span><br><br>

    <strong>🌐 Red</strong><br>
    <span id="netTexto">Detectando…</span><br><br>

    <strong>🚀 Velocidad</strong><br>
    <span id="speedTexto">0 km/h</span>
  </div>

</div>

<!-- VISOR -->
<div id="viewer" class="viewer">
  <div class="viewer-header">
    <span id="viewerTitle"></span>
    <button onclick="volver()">⬅ Volver</button>
  </div>
  <iframe id="frame"></iframe>
</div>

</div>

<!-- SCRIPTS (ORDEN CORRECTO, SIN ROMPER main.js) -->
<script src="app-global.js" defer></script>
<script src="empresa-header.js" defer></script>
<script src="auth.js" defer></script>
<script src="main.js" defer></script>
<script src="segurity.js" defer></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
