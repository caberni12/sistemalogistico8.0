<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
 --bg:#f1f5f9;
 --text:#0f172a;
 --muted:#64748b;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
 --header-h:72px; /* ALTURA DINÁMICA */
}

/* RESET */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

html,body{
 margin:0;
 padding:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* BOTONES */
button{
 border:none;
 border-radius:var(--radius);
 padding:10px 16px;
 font-weight:600;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 gap:8px;
 box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.btn-primary{
 background:linear-gradient(135deg,#60a5fa,#2563eb);
 color:#fff;
}

.btn-danger{
 background:linear-gradient(135deg,#f87171,#dc2626);
 color:#fff;
}

.btn-ghost{
 background:#fff;
 border:1px solid var(--border);
 box-shadow:none;
}

/* HEADER */
header{
 position:fixed;
 top:0;
 left:0;
 right:0;
 height:var(--header-h);
 background:#fff;
 display:flex;
 flex-direction:column;
 justify-content:center;
 padding:8px 16px;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 14px rgba(0,0,0,.06);
 z-index:1000;
 transition:.3s ease;
}

header.oculto{
 height:0;
 padding:0;
 overflow:hidden;
}

/* CONTROLES HEADER */
.header-top{
 display:flex;
 align-items:center;
 justify-content:space-between;
 gap:10px;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 width:40px;
 height:40px;
 padding:0;
 font-size:20px;
 display:flex;
 align-items:center;
 justify-content:center;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
}

header h1{
 font-size:16px;
 margin:0;
}

.header-right{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
}

.user{
 font-size:12px;
 color:var(--muted);
}

/* MAPA */
#mapaBox{
 margin-top:var(--header-h);
 height:calc(100vh - var(--header-h));
 transition:.3s ease;
}

header.oculto ~ #mapaBox{
 margin-top:0;
 height:100vh;
}

/* LEAFLET FIX */
.leaflet-top{
 top:calc(var(--header-h) + 8px) !important;
}

/* DASHBOARD */
#dashboardMapa{
 position:absolute;
 bottom:16px;
 left:16px;
 right:16px;
 background:#fff;
 border-radius:16px;
 padding:14px;
 font-size:12px;
 box-shadow:0 14px 30px rgba(0,0,0,.22);
}

/* BOTÓN MOSTRAR / OCULTAR */
#toggleHeader{
 position:fixed;
 top:10px;
 right:10px;
 z-index:2000;
 padding:8px 10px;
 font-size:14px;
}

/* VISOR */
.viewer{
 display:none;
 position:fixed;
 top:var(--header-h);
 left:0;
 right:0;
 bottom:0;
 background:#fff;
 z-index:999;
}

.viewer iframe{
 width:100%;
 height:100%;
 border:none;
}
</style>
</head>

<body>

<button id="toggleHeader" class="btn-ghost" onclick="toggleHeader()">👁</button>

<header id="mainHeader">
  <div class="header-top">
    <div class="header-left">
      <button id="btnMenu" onclick="toggleMenu()">☰</button>
      <button id="btnVolver" class="btn-ghost" onclick="volver()" style="display:none">⬅</button>
      <h1 id="tituloSistema">Panel Logístico</h1>
    </div>

    <div class="header-right">
      <button class="btn-primary" onclick="recargarPanel()">⟳</button>
      <button class="btn-danger" onclick="cerrarSesion()">⏻</button>
    </div>
  </div>

  <div class="user">
    <span id="usuario"></span> · <span id="conexionInfo"></span>
  </div>
</header>

<div id="mapaBox">
  <div id="mapa"></div>

  <div id="dashboardMapa">
    <div><strong>📍 Dirección:</strong> <span id="dirTexto">Detectando…</span></div>
    <div><strong>🌐 Red:</strong> <span id="netTexto">Detectando…</span></div>
    <div><strong>🚀 Velocidad:</strong> <span id="speedTexto">0 km/h</span></div>
  </div>
</div>

<div id="viewer" class="viewer">
  <iframe id="frame"></iframe>
</div>

<script>
function toggleHeader(){
 const h=document.getElementById("mainHeader");
 h.classList.toggle("oculto");
}
</script>

<!-- TUS SCRIPTS -->
<script src="empresa.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

</body>
</html>
