<!DOCTYPE html>
<html lang="es">
<head>

<!-- ================= PWA ================= -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>

<!-- VIEWPORT (más zoom real) -->
<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* =====================================================
   VARIABLES
===================================================== */
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
}

/* =====================================================
   RESET
===================================================== */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

html,body{
 margin:0;
 padding:0;
 width:100%;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* =====================================================
   APP
===================================================== */
.app{
 display:flex;
 flex-direction:column;
 height:100vh;
 overflow:hidden;
}

/* =====================================================
   HEADER
===================================================== */
header{
 position:sticky;
 top:0;
 z-index:100;
 background:#fff;
 border-bottom:1px solid var(--border);
 box-shadow:0 3px 10px rgba(0,0,0,.05);
 padding:8px 10px;
 display:flex;
 flex-direction:column;
 gap:8px;
}

@media (min-width:769px){
 header{
   flex-direction:row;
   align-items:center;
 }
}

/* =====================================================
   MAIN
===================================================== */
.main{
 flex:1;
 position:relative;
 overflow:hidden;
}

/* =====================================================
   MAPA
===================================================== */
#mapaBox{
 position:absolute;
 inset:0;
}

#mapa{
 width:100%;
 height:100%;
}

/* =====================================================
   TARJETA INFO
===================================================== */
#dashboardMapa{
 background:#fff;
 border-radius:14px;
 padding:12px;
 box-shadow:0 14px 40px rgba(0,0,0,.25);
 font-size:11px;
}

/* Estado oculto SOLO para la tarjeta */
#dashboardMapa.oculto{
 opacity:0;
 pointer-events:none;
 transform:translateY(-8px);
}

/* =====================================================
   CONTROLES + / -  (SIEMPRE VISIBLES)
===================================================== */
.dash-controls{
 position:fixed;              /* ← fuera de la tarjeta */
 top:96px;                    /* debajo del header */
 right:16px;
 z-index:10000;
 display:flex;               /* ← NUNCA ocultos en escritorio */
 gap:6px;
}

.dash-controls button{
 width:34px;
 height:34px;
 border-radius:8px;
 border:none;
 cursor:pointer;
 font-weight:700;
 background:#0f172a;
 color:#fff;
 pointer-events:auto;
}

/* =====================================================
   MENU LATERAL
===================================================== */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100vh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.35s ease;
 z-index:9997;
 display:flex;
 flex-direction:column;
}

.menu-lateral.open{
 left:0;
}

/* =====================================================
   VISOR
===================================================== */
.viewer{
 display:none;
 position:fixed;
 inset:0;
 background:#fff;
 z-index:9996;
 flex-direction:column;
}

/* =====================================================
   LOADER
===================================================== */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.92);
 backdrop-filter:blur(4px);
 z-index:10000;
 display:none;
 align-items:center;
 justify-content:center;
 font-weight:600;
}

/* =====================================================
   ESCRITORIO
===================================================== */
@media (min-width:769px){

 /* Tarjeta flotante */
 #dashboardMapa{
   position:absolute;
   top:16px;
   left:50%;
   transform:translateX(-50%);
   z-index:9999;
   max-width:900px;
   width:calc(100% - 32px);
   transition:opacity .25s ease, transform .25s ease;
 }
}

/* =====================================================
   MÓVIL
===================================================== */
@media (max-width:768px){

 .main{
   overflow:auto;
 }

 #mapaBox{
   position:relative;
   height:360px;
 }

 #dashboardMapa{
   position:relative;
   margin:12px;
   transform:none;
 }

 /* ❌ botones NO visibles en móvil */
 .dash-controls{
   display:none;
 }
}
</style>
</head>

<body>

<div class="app">

<div id="loadingOverlay">Iniciando sistema…</div>
<div id="progressBar"></div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
  <div class="menu-header">
    <span>📦 Panel de Gestión</span>
    <button class="btn-ghost" onclick="toggleMenu()">✕</button>
  </div>
  <div id="menuModulos" class="menu-items"></div>
</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>
    <img id="logoEmpresa" style="height:36px;max-width:120px;display:none">
    <h1 id="tituloSistema">Panel Logístico</h1>
  </div>

  <div class="header-info">
    <div id="usuario"></div>
    <div id="conexionInfo"></div>
  </div>

  <div class="right">
    <button class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
    <button class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
    <button id="btnMostrar" title="Mostrar" style="display:none">➕</button>    
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div id="mapaBox">
    <div id="mapa"></div>

    <div id="dashboardMapa">
     <div class="dash-controls">
  <button id="btnOcultar" title="Ocultar">➖</button>
 
</div>




 <strong>📍 Dirección</strong><br>
      <span id="dirTexto">Detectando…</span><br><br>

      <strong>🌐 Red</strong><br>
      <span id="netTexto">Detectando…</span><br><br>

      <strong>🚀 Velocidad</strong><br>
      <span id="speedTexto">0 km/h</span>
    </div>
  </div>
</div>

<!-- VISOR -->
<div id="viewer" class="viewer">
  <div class="viewer-header">
    <span id="viewerTitle"></span>
    <button class="btn-ghost" onclick="volver()">⬅ Volver</button>
  </div>
  <iframe id="frame"></iframe>
</div>

</div>

<!-- SCRIPTS -->
<script src="app-global.js"></script>
<script src="empresa-header.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
