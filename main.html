<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --accent:#14b8a6;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
}

/* RESET */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

html,body{
 margin:0;
 padding:0;
 height:100%;
 background:var(--bg);
 color:var(--text);
}

/* Leaflet fix */
.leaflet-div-icon{
 background:none !important;
 border:none !important;
}

/* ================= BOTONES ================= */
button{
 border:none;
 border-radius:var(--radius);
 padding:10px 16px;
 font-weight:600;
 cursor:pointer;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 gap:8px;
 transition:.25s ease;
 box-shadow:0 6px 18px rgba(0,0,0,.12);
}

button:active{ transform:scale(.97); }

.btn-primary{
 background:linear-gradient(135deg,#60a5fa,#2563eb);
 color:#fff;
}

.btn-danger{
 background:linear-gradient(135deg,#f87171,#dc2626);
 color:#fff;
}

.btn-ghost{
 background:#fff;
 border:1px solid var(--border);
 box-shadow:none;
}

/* ================= HEADER ================= */
header{
 height:72px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 padding:12px 16px;
 background:#fff;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 14px rgba(0,0,0,.06);
 z-index:10;
}

.header-left{
 display:flex;
 align-items:center;
 gap:10px;
}

/* Hamburguesa */
#btnMenu{
 width:40px;
 height:40px;
 padding:0;
 font-size:20px;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
 flex-shrink:0;
}

header h1{
 margin:0;
 font-size:17px;
 font-weight:700;
 white-space:nowrap;
}

header .right{
 display:flex;
 align-items:center;
 gap:12px;
}

header .user{
 font-size:12px;
 color:var(--muted);
 line-height:1.2;
}

/* ================= MENU ================= */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100vh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.35s ease;
 z-index:9997;
 display:flex;
 flex-direction:column;
}

.menu-lateral.open{ left:0; }

.menu-header{
 padding:16px;
 border-bottom:1px solid var(--border);
 display:flex;
 justify-content:space-between;
 align-items:center;
 font-weight:700;
}

.menu-items{
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
 overflow-y:auto;
}

.menu-item{
 padding:14px;
 border-radius:var(--radius);
 background:var(--hover);
 font-weight:600;
 cursor:pointer;
}

/* ================= MAPA ================= */
#mapaBox{
 position:relative;
 width:100%;
 height:calc(100vh - 72px);
}

#mapa{
 width:100%;
 height:100%;
}

/* ================= DASHBOARD ================= */
#dashboardMapa{
 position:absolute;
 bottom:16px;
 left:16px;
 right:16px;
 background:#fff;
 border-radius:16px;
 padding:14px 16px;
 box-shadow:0 14px 30px rgba(0,0,0,.22);
 font-size:12px;
 z-index:500;
}

/* ================= VISOR ================= */
.viewer{
 display:none;
 position:fixed;
 inset:0;
 height:100vh;
 background:#fff;
 z-index:9996;
 flex-direction:column;
 overflow:hidden;
}

.viewer-header{
 height:52px;
 padding:0 14px;
 border-bottom:1px solid var(--border);
 display:flex;
 align-items:center;
 justify-content:space-between;
}

.viewer iframe{
 flex:1;
 width:100%;
 height:calc(100vh - 52px);
 border:none;
}

/* ================= MOBILE FIX ================= */
@media (max-width:768px){

 header{
   flex-direction:column;
   align-items:flex-start;
   height:auto;
   gap:8px;
 }

 .header-left{
   width:100%;
   justify-content:flex-start;
 }

 header h1{
   font-size:15px;
 }

 /* 🔥 INFO SUPERIOR EN UNA SOLA FILA */
 .header-info{
   width:100%;
   display:flex;
   justify-content:space-between;
   align-items:center;
   gap:8px;
 }

 header .right{
   width:100%;
   display:flex;
   flex-direction:column;
   gap:8px;
 }

 header .right button{
   width:100%;
 }

 #btnMenu{
   width:36px;
   height:36px;
   font-size:18px;
 }

 #mapaBox{
   height:calc(100vh - 128px);
 }
}
</style>
</head>

<body>

<div id="progressBar"></div>
<div id="loadingOverlay">Iniciando sistema…</div>

<div id="menuLateral" class="menu-lateral">
  <div class="menu-header">
    <span>📦 Panel de Gestíon</span>
    <button class="btn-ghost" onclick="toggleMenu()">✕</button>
  </div>
  <div id="menuModulos" class="menu-items"></div>
</div>

<header>
  <div class="header-left">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>
    <h1 id="tituloSistema">Panel Logístico</h1>
  </div>

  <!-- INFO COMPACTA -->
  <div class="header-info">
    <div id="usuario" class="user"></div>
    <div id="conexionInfo" class="user"></div>
  </div>

  <div class="right">
    <button class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
    <button class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
  </div>
</header>

<div id="mapaBox">
  <div id="mapa"></div>

  <div id="dashboardMapa">
    <strong>📍 Dirección</strong>
    <span id="dirTexto">Detectando…</span><br><br>

    <strong>🌐 Red</strong>
    <span id="netTexto">Detectando…</span><br><br>

    <strong>🚀 Velocidad</strong>
    <span id="speedTexto">0 km/h</span>
  </div>
</div>

<div id="viewer" class="viewer">
  <div class="viewer-header">
    <span id="viewerTitle"></span>
    <button class="btn-ghost" onclick="volver()">⬅ Volver</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<script src="empresa.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

</body>
</html>
