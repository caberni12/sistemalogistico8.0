<!DOCTYPE html>
<html lang="es">
<head>

<!-- ================= PWA ================= -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<meta charset="UTF-8">
<title>Panel Logístico</title>

<meta name="viewport"
      content="width=device-width,
               initial-scale=0.9,
               maximum-scale=1,
               user-scalable=no">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
 --bg:#f1f5f9;
 --card:#ffffff;
 --hover:#f8fafc;
 --text:#0f172a;
 --muted:#64748b;
 --primary:#3b82f6;
 --danger:#ef4444;
 --border:#e2e8f0;
 --radius:12px;
}

/* RESET */
*{
 box-sizing:border-box;
 font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
 -webkit-tap-highlight-color:transparent;
}

html,body{
 margin:0;
 padding:0;
 width:100%;
 height:100%;
 background:var(--bg);
 color:var(--text);
 overflow:hidden; /* body NO scrollea */
}

/* APP */
.app{
 display:flex;
 flex-direction:column;
 min-height:100dvh;
}

/* ================= HEADER ================= */
header{
 position:sticky;
 top:0;
 z-index:20;
 background:#fff;
 border-bottom:1px solid var(--border);
 box-shadow:0 4px 14px rgba(0,0,0,.06);
 padding:10px 12px;
 display:flex;
 flex-direction:column;
 gap:8px;
}

.header-top{
 display:flex;
 align-items:center;
 gap:10px;
}

#btnMenu{
 width:40px;
 height:40px;
 font-size:20px;
 background:linear-gradient(135deg,#2dd4bf,#0d9488);
 color:#fff;
 border:none;
 border-radius:12px;
 cursor:pointer;
}

header h1{
 margin:0;
 font-size:16px;
 font-weight:700;
}

/* INFO REAL (rellenada por JS) */
.header-info{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 font-size:12px;
 color:var(--muted);
}

.header-info div{
 display:flex;
 align-items:center;
 gap:6px;
}

/* BOTONES EN PARALELO */
.header-actions{
 display:flex;
 gap:10px;
}

.header-actions button{
 flex:1;
 padding:10px;
 border-radius:14px;
 font-weight:600;
 border:none;
 color:#fff;
 cursor:pointer;
}

.btn-primary{
 background:linear-gradient(135deg,#60a5fa,#2563eb);
}

.btn-danger{
 background:linear-gradient(135deg,#f87171,#dc2626);
}

/* ================= MAIN (SCROLL ANDROID) ================= */
.main{
 flex:1;
 overflow-y:auto;                  /* scroll nativo */
 -webkit-overflow-scrolling:touch; /* Android */
}

/* MAPA */
#mapa{
 width:100%;
 min-height:320px;
}

/* TARJETA INFO */
#dashboardMapa{
 margin:12px;
 background:#fff;
 border-radius:16px;
 padding:14px 16px;
 box-shadow:0 14px 30px rgba(0,0,0,.22);
 font-size:12px;
}

/* ================= MENU ================= */
.menu-lateral{
 position:fixed;
 top:0;
 left:-300px;
 width:300px;
 height:100dvh;
 background:#fff;
 box-shadow:6px 0 28px rgba(0,0,0,.18);
 transition:.35s ease;
 z-index:9997;
 display:flex;
 flex-direction:column;
}

.menu-lateral.open{ left:0; }

/* ================= VISOR ================= */
.viewer{
 display:none;
 position:fixed;
 inset:0;
 background:#fff;
 z-index:9996;
 flex-direction:column;
}

/* ================= LOADER ================= */
#loadingOverlay{
 position:fixed;
 inset:0;
 background:rgba(241,245,249,.92);
 z-index:10000;
 display:none;
 align-items:center;
 justify-content:center;
 font-weight:600;
}
</style>
</head>

<body>

<div class="app">

<!-- LOADER -->
<div id="loadingOverlay">Iniciando sistema…</div>

<!-- MENU -->
<div id="menuLateral" class="menu-lateral">
  <div class="menu-header">
    <span>📦 Panel de Gestión</span>
    <button onclick="toggleMenu()">✕</button>
  </div>
  <div id="menuModulos"></div>
</div>

<!-- ================= HEADER ================= -->
<header>

  <div class="header-top">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>

    <img id="logoEmpresa"
         alt="Logo Empresa"
         style="height:34px;max-width:120px;object-fit:contain;display:none;">

    <h1 id="tituloSistema">Panel Logístico</h1>
  </div>

  <!-- DATOS REALES (JS) -->
  <div class="header-info">
    <div id="usuario"></div>
    <div id="fechaHora"></div>
    <div id="conexionInfo"></div>
  </div>

  <!-- BOTONES -->
  <div class="header-actions">
    <button class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
    <button class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
  </div>

</header>

<!-- ================= MAIN ================= -->
<div class="main">

  <div id="mapa"></div>

  <div id="dashboardMapa">
    <strong>📍 Dirección</strong><br>
    <span id="dirTexto">Detectando…</span><br><br>

    <strong>🌐 Red</strong><br>
    <span id="netTexto">Detectando…</span><br><br>

    <strong>🚀 Velocidad</strong><br>
    <span id="speedTexto">0 km/h</span>
  </div>

</div>

</div>

<!-- ================= SCRIPTS (TUS ARCHIVOS) ================= -->
<script src="app-global.js"></script>
<script src="empresa-header.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
